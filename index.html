<!DOCTYPE html>

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script>
    // 야간(다크) 모드: 기본값은 화이트, 사용자가 직접 선택해 저장한 경우만 다크 적용
    (function () {
      try {
        if (localStorage.getItem("theme") === "dark") document.documentElement.classList.add("dark");
        // 글씨 크기(고령 성도 배려): lg=크게, xl=아주 크게. 기본(보통)은 속성 없음
        var fs = localStorage.getItem("fontscale");
        if (fs === "lg" || fs === "xl") document.documentElement.setAttribute("data-fs", fs);
      } catch (e) {}
    })();
  </script>

  <script>
    window.__splashStart = Date.now(); // 스플래시 최소 노출 시간 계산용
    // 스플래시 숨기기(콘텐츠 준비되면 app.js가 호출, 못 부르면 최대 4초 뒤 자동)
    window.hideSplash = function () {
      var s = document.getElementById("splash");
      if (!s) return;
      s.classList.add("hide");
      setTimeout(function () { if (s && s.parentNode) s.parentNode.removeChild(s); }, 450);
    };
    setTimeout(window.hideSplash, 7000); // 안전장치(app.js가 최소 5초 유지 후 닫음)
  </script>
