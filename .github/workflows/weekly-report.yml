name: 주간 리포트 자동 발송

on:
  schedule:
    - cron: '0 23 * * 0'   # 매주 월요일 08:00 KST
  workflow_dispatch:
    inputs:
      from:
        description: '시작일(YYYY-MM-DD). 비우면 전주 월~일'
        required: false
        type: string
      to:
        description: '종료일(YYYY-MM-DD). 비우면 전주 월~일'
        required: false
        type: string

jobs:
  weekly-report:
    runs-on: ubuntu-latest
    steps:
      - name: 주간 리포트 생성 + 텔레그램 발송
        env:
          API_URL: https://xnomlgydifiqiybervtf.supabase.co/functions/v1/api
          ANON: sb_publishable_oLtieT_jw7Gjb8etEsy0jw_thBaDjl-
          ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}
          TG_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
          REPORT_FROM: ${{ github.event.inputs.from }}
          REPORT_TO: ${{ github.event.inputs.to }}
        run: |
          set -euo pipefail

          if [ -z "${ADMIN_SECRET:-}" ] || [ -z "${TG_TOKEN:-}" ] || [ -z "${TG_CHAT:-}" ]; then
            echo "⏭️  시크릿(ADMIN_SECRET/TELEGRAM_TOKEN/TELEGRAM_CHAT_ID) 미설정 — 주간 리포트 건너뜀"
            exit 0
          fi

          body=$(jq -n \
            --arg pw "$ADMIN_SECRET" \
            --arg from "${REPORT_FROM:-}" \
            --arg to "${REPORT_TO:-}" \
            '{action:"weeklyReport", pw:$pw}
             + (if $from != "" then {from:$from} else {} end)
             + (if $to != "" then {to:$to} else {} end)')

          resp=$(curl -s -m 60 -w $'\n%{http_code}' -X POST "$API_URL" \
            -H "Content-Type: application/json" \
            -H "apikey: $ANON" \
            -H "Authorization: Bearer $ANON" \
            -d "$body")
          code=$(printf '%s' "$resp" | tail -n1)
          json=$(printf '%s' "$resp" | sed '$d')
          printf '%s' "$json" > report.json

          ok=false
          if [ "$code" = "200" ]; then
            ok=$(jq -r '.ok // false' report.json)
          fi

          if [ "$ok" != "true" ]; then
            err=$(jq -r '.error // "unknown error"' report.json 2>/dev/null || echo "unknown error")
            text="[성경암송 주간 리포트] 생성 실패"$'\n'"HTTP ${code:-timeout}"$'\n'"${err}"
            curl -s -m 20 "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
              --data-urlencode "chat_id=${TG_CHAT}" \
              --data-urlencode "text=${text}" >/dev/null || true
            echo "::error::$text"
            cat report.json
            exit 1
          fi

          jq -r '.text' report.json > report.txt
          jq -r '.csv' report.json > weekly-report.csv

          curl -s -m 20 "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TG_CHAT}" \
            --data-urlencode text@report.txt >/dev/null

          caption=$(jq -r '"성경암송 주간 리포트 CSV (" + .report.from + " ~ " + .report.to + ")"' report.json)
          curl -s -m 30 "https://api.telegram.org/bot${TG_TOKEN}/sendDocument" \
            -F "chat_id=${TG_CHAT}" \
            -F "caption=${caption}" \
            -F "document=@weekly-report.csv;filename=weekly-report.csv" >/dev/null

          echo "✅ 주간 리포트 발송 완료"
