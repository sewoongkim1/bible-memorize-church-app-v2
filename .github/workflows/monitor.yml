name: 장애 모니터 (매일 아침 점검 + 텔레그램 경보)

on:
  schedule:
    - cron: '12 22 * * *'   # 매일 22:12 UTC = 07:12 KST (정기 발송 7:00 직후, 미발송 판정 07:08 이후에 점검)
  workflow_dispatch:        # 수동 실행(테스트)용
    inputs:
      force_alert:
        description: '경보 채널 테스트(텔레그램으로 샘플 경보 발송)'
        type: boolean
        default: false
      diag_send:
        description: '발송 진단(sendPush diag — 실제 web-push 에러 확인)'
        type: boolean
        default: false
      weekly_test:
        description: '주간 리포트 테스트 발송(지금 이메일 보내기)'
        type: boolean
        default: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: 백엔드 상태 점검 + 문제 시 텔레그램 경보
        env:
          API_URL: https://xnomlgydifiqiybervtf.supabase.co/functions/v1/api
          ANON: sb_publishable_oLtieT_jw7Gjb8etEsy0jw_thBaDjl-
          ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}
          TG_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
          FORCE_ALERT: ${{ github.event.inputs.force_alert }}
          DIAG_SEND: ${{ github.event.inputs.diag_send }}
          WEEKLY_TEST: ${{ github.event.inputs.weekly_test }}
        run: |
          set -uo pipefail

          # 0) 아직 설정(시크릿) 전이면 조용히 스킵 (실패 알림 방지)
          if [ -z "${ADMIN_SECRET:-}" ]; then
            echo "⏭️  ADMIN_SECRET 미설정 — 점검 건너뜀"; exit 0
          fi

          # 0-0) 주간 리포트 테스트 발송(지금 이메일 전송) — 기간은 서버가 '전주 금~이번주 목'으로 자동 계산
          if [ "${WEEKLY_TEST:-false}" = "true" ]; then
            echo "📧 주간 리포트 테스트 발송..."
            curl -s -m 60 -X POST "$API_URL" -H "Content-Type: application/json" \
              -H "apikey: $ANON" -H "Authorization: Bearer $ANON" \
              -d "{\"action\":\"weeklyReport\",\"pw\":\"$ADMIN_SECRET\",\"send\":false}"
            echo ""; exit 0
          fi

          # 0-2) 발송 진단 모드: sendPush를 diag로 호출해 실제 web-push 에러/설정 상태만 출력(텔레그램 없음)
          if [ "${DIAG_SEND:-false}" = "true" ]; then
            echo "🔧 발송 진단 실행..."
            curl -s -m 40 -X POST "$API_URL" -H "Content-Type: application/json" \
              -H "apikey: $ANON" -H "Authorization: Bearer $ANON" \
              -d "{\"action\":\"sendPush\",\"pw\":\"$ADMIN_SECRET\",\"latest\":true,\"diag\":true,\"mode\":\"diag\"}"
            echo ""; exit 0
          fi

          if [ -z "${TG_TOKEN:-}" ] || [ -z "${TG_CHAT:-}" ]; then
            echo "⏭️  텔레그램 시크릿 미설정 — 점검 건너뜀"; exit 0
          fi

          # 0-1) 경보 채널 테스트 모드: 샘플 경보만 보내고 종료
          if [ "${FORCE_ALERT:-false}" = "true" ]; then
            text="[성경암송 모니터] 🔔 경보 채널 테스트"$'\n'"이 메시지가 보이면 장애 경보가 정상 작동합니다."
            curl -s -m 20 "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
              --data-urlencode "chat_id=${TG_CHAT}" \
              --data-urlencode "text=${text}" >/dev/null || true
            echo "테스트 경보 발송 완료"; exit 0
          fi

          # 1) monitor 엔드포인트 호출 (백엔드/DB/발송/데이터 종합 점검)
          resp=$(curl -s -m 30 -w $'\n%{http_code}' -X POST "$API_URL" \
            -H "Content-Type: application/json" \
            -H "apikey: $ANON" -H "Authorization: Bearer $ANON" \
            -d "{\"action\":\"monitor\",\"pw\":\"$ADMIN_SECRET\"}")
          code=$(printf '%s' "$resp" | tail -n1)
          json=$(printf '%s' "$resp" | sed '$d')

          # 2) 경보 문구 결정
          alert=""
          if [ "$code" != "200" ]; then
            alert="🔴 백엔드 응답 이상 (HTTP ${code:-timeout})"$'\n'"— Edge Function / Supabase 확인 필요"
          else
            ok=$(printf '%s' "$json" | jq -r '.ok // false')
            if [ "$ok" != "true" ]; then
              probs=$(printf '%s' "$json" | jq -r '.problems[]? | "• " + .')
              alert="🔴 장애 감지"$'\n'"$probs"
            fi
          fi

          # 3) 문제 있으면 텔레그램 발송, 없으면 정상 종료
          if [ -n "$alert" ]; then
            nowkst=$(date -u -d '+9 hours' '+%m-%d %H:%M')
            text="[성경암송 모니터] ${nowkst} KST"$'\n'"$alert"
            if [ -n "${TG_TOKEN:-}" ] && [ -n "${TG_CHAT:-}" ]; then
              curl -s -m 20 "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
                --data-urlencode "chat_id=${TG_CHAT}" \
                --data-urlencode "text=${text}" >/dev/null || true
            fi
            echo "::error::$alert"
            echo "$json"
            exit 1
          fi

          echo "✅ 정상: $json"
