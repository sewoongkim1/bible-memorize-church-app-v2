<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>설교말씀 도우미</title>
<style>
  :root { --navy:#1a3a6b; --gold:#a67c12; --line:#e2ded2; --ink:#17223a; --mute:#7c8598; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:system-ui,"Malgun Gothic",sans-serif; background:#f4f2ec; color:var(--ink); }
  header { background:var(--navy); color:#fff; padding:14px 18px; display:flex; align-items:center; flex-wrap:wrap; gap:8px 12px; position:sticky; top:0; z-index:10; }
  header h1 { font-size:16px; margin:0; flex:1 1 100%; white-space:nowrap; }
  @media (min-width:560px){ header h1 { flex:1; } }
  header a, header button { color:#fff; background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.2); border-radius:8px; padding:6px 12px; font-size:13px; text-decoration:none; cursor:pointer; }
  main { max-width:720px; margin:0 auto; padding:16px; }
  .ask { display:flex; gap:8px; margin-bottom:12px; }
  .ask input { flex:1; min-width:0; padding:11px 14px; border:1px solid var(--line); border-radius:10px; font-size:15px; }
  .ask button { flex-shrink:0; white-space:nowrap; padding:11px 20px; background:var(--navy); color:#fff; border:0; border-radius:10px; font-weight:700; cursor:pointer; }
  .ask button:disabled { opacity:.6; cursor:default; }
  /* 안내 박스 */
  .hint { background:#fbf5e6; border:1px solid #ecd9a8; border-radius:12px; padding:12px 14px; margin-bottom:16px; font-size:13px; line-height:1.6; color:#5c4a1f; }
  .hint b.h { display:block; color:var(--gold); font-size:13px; margin-bottom:6px; }
  .hint p { margin:4px 0; padding-left:13px; position:relative; }
  .hint p::before { content:"·"; position:absolute; left:2px; color:var(--gold); font-weight:800; }
  .answer { background:#fff; border:1px solid var(--line); border-radius:12px; padding:16px 18px; font-size:15px; line-height:1.75; white-space:pre-wrap; }
  /* 설교 출처 카드 */
  .sources { margin-top:14px; display:flex; flex-direction:column; gap:8px; }
  .src { display:flex; align-items:center; gap:12px; width:100%; text-align:left; background:#fff; border:1px solid var(--line); border-left:4px solid var(--navy); border-radius:12px; padding:12px 14px; cursor:pointer; box-shadow:0 1px 3px rgba(0,0,0,.05); transition:transform .12s, box-shadow .12s, border-color .12s; }
  .src:hover { transform:translateY(-1px); box-shadow:0 4px 12px rgba(26,58,107,.12); border-color:var(--navy); }
  .src-icon { flex-shrink:0; width:34px; height:34px; display:flex; align-items:center; justify-content:center; background:#eef4ff; border-radius:9px; font-size:16px; }
  .src-body { flex:1; min-width:0; display:flex; flex-direction:column; gap:2px; }
  .src-title { font-weight:700; color:var(--ink); font-size:15px; }
  .src-meta { color:var(--mute); font-size:12.5px; }
  .src-arrow { flex-shrink:0; color:var(--mute); font-size:20px; line-height:1; }
  .disclaimer { margin-top:16px; font-size:12px; color:var(--mute); line-height:1.6; }
  /* 설교 출처 팝업(모달) */
  .modal-bg { position:fixed; inset:0; background:rgba(23,34,58,.5); display:flex; align-items:center; justify-content:center; z-index:50; padding:16px; }
  .modal { background:#fff; border-radius:16px; max-width:460px; width:100%; max-height:82vh; overflow:auto; box-shadow:0 20px 50px rgba(0,0,0,.3); position:relative; padding:22px; }
  .modal-x { position:absolute; top:12px; right:12px; width:32px; height:32px; border:0; background:#f4f2ec; border-radius:50%; font-size:15px; cursor:pointer; color:var(--mute); }
  .modal-x:hover { background:#e7e3d7; color:var(--ink); }
  .modal-rows { display:flex; flex-direction:column; gap:10px; margin:6px 30px 18px 0; }
  .modal-rows > div { display:flex; gap:12px; font-size:15px; }
  .modal-rows .k { flex-shrink:0; width:48px; color:var(--mute); font-size:13px; padding-top:1px; }
  .modal-rows .v { flex:1; color:var(--ink); font-weight:600; }
  .modal-btns { display:flex; gap:8px; }
  .mb { flex:1; padding:12px; border-radius:10px; font-size:14px; font-weight:700; cursor:pointer; border:1px solid var(--line); }
  .mb.watch { background:var(--navy); color:#fff; border-color:var(--navy); }
  .mb.summary { background:#fff; color:var(--navy); }
  .mb.summary:hover { background:#f7faff; }
  .modal-summary { margin-top:16px; padding-top:16px; border-top:1px solid var(--line); font-size:14px; line-height:1.75; color:#4a4238; white-space:pre-wrap; }
  .empty { color:var(--mute); text-align:center; padding:40px 0; }
  .login { max-width:320px; margin:60px auto; text-align:center; }
  .login input { width:100%; padding:11px; border:1px solid var(--line); border-radius:8px; margin:10px 0; }
  .login button { width:100%; padding:11px; background:var(--navy); color:#fff; border:0; border-radius:8px; font-weight:700; cursor:pointer; }
  .toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#222; color:#fff; padding:10px 18px; border-radius:20px; font-size:13px; opacity:0; transition:opacity .3s; pointer-events:none; }
  .toast.show { opacity:1; }
  /* 주제 워드클라우드 → 질문 → 입력창 채우기 */
  .topics { margin-bottom:16px; }
  .topics-label { font-size:13px; font-weight:700; color:var(--navy); margin:0 0 8px; }
  /* 5개씩 2줄 = 10칸 격자, 각 주제를 타원형(알약)으로 감싼다 */
  .cloud { display:grid; grid-template-columns:repeat(5,1fr); gap:8px; }
  .cloud button { display:flex; align-items:center; justify-content:center; padding:11px 4px; border:1px solid var(--line); border-radius:999px; background:#fff; color:var(--ink); font-size:15px; font-weight:600; cursor:pointer; box-shadow:0 1px 2px rgba(0,0,0,.04); transition:background .15s,color .15s,border-color .15s; }
  .cloud button:hover { border-color:var(--navy); color:var(--navy); }
  .cloud button.on { background:var(--navy); color:#fff; border-color:var(--navy); font-weight:700; }
  @media (max-width:400px){ .cloud button { font-size:14px; padding:10px 2px; } }
  .tqs { margin-top:10px; display:flex; flex-direction:column; gap:6px; }
  .tq { text-align:left; background:#fff; border:1px solid var(--line); border-radius:9px; padding:9px 12px; font-size:14px; color:var(--ink); cursor:pointer; }
  .tq:hover { border-color:var(--navy); background:#f7faff; }
</style>
</head>
<body>
<div id="app"></div>
<div class="toast" id="toast"></div>
<script>
const FN = "https://xnomlgydifiqiybervtf.supabase.co/functions/v1/api";
const KEY = "sb_publishable_oLtieT_jw7Gjb8etEsy0jw_thBaDjl-";
let pw = sessionStorage.getItem("admin-pw") || "";
const $ = (id) => document.getElementById(id);
const esc = (s) => String(s==null?"":s).replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

// 주제(설교 태그 기반, 빈도순 크기) → 질문. 모든 질문은 실제 검색에서 답이
// 나오는 것만 남겼다(2026-07-23 실측: match_sermon_chunks 최상위 유사도 ≥0.42).
// 항목을 바꿀 땐 실제 검색으로 재검증할 것 — 안 그러면 눌렀을 때 "찾지
// 못했습니다"로 빠지는 질문을 성도에게 권하게 된다.
// 9개 핵심 주제(2자) + "기타"(나머지 주제 질문을 모두 몰아넣음) = 5×2 격자 10칸.
const TOPICS = [
  { t:"기도", qs:["기도가 잘 안 될 때 어떻게 해야 하나요?","응답이 없는 기도는 어떻게 붙들어야 하나요?","기도의 능력에 대해 목사님은 뭐라고 하셨나요?"] },
  { t:"순종", qs:["하나님께 순종하기 어려울 때 어떻게 해야 하나요?","순종이 왜 그렇게 중요한가요?"] },
  { t:"은혜", qs:["하나님의 은혜를 어떻게 경험할 수 있나요?","은혜로 산다는 것은 무슨 뜻인가요?"] },
  { t:"감사", qs:["감사가 나오지 않을 때 어떻게 감사할 수 있나요?","감사하는 삶은 왜 중요한가요?"] },
  { t:"말씀", qs:["말씀을 어떻게 삶에 적용해야 하나요?","성경을 어떻게 읽어야 하나요?"] },
  { t:"고난", qs:["고난을 겪을 때 어떻게 믿음을 지킬 수 있나요?","힘든 시간을 어떻게 견뎌야 하나요?"] },
  { t:"믿음", qs:["믿음이 약해질 때 어떻게 해야 하나요?","참된 믿음이란 무엇인가요?"] },
  { t:"전도", qs:["어떻게 복음을 전해야 하나요?","전도가 두려울 때 어떻게 해야 하나요?"] },
  { t:"사랑", qs:["하나님의 사랑을 어떻게 알 수 있나요?"] },
  { t:"기타", qs:["일터에서 어떻게 신앙생활을 해야 하나요?","일상에서 하나님을 어떻게 섬길 수 있나요?","가정에서 어떻게 신앙적으로 살아야 하나요?","예수님의 제자로 산다는 것은 무엇인가요?","십자가는 우리에게 어떤 의미인가요?"] },
];

async function call(action, body={}) {
  const r = await fetch(FN, { method:"POST", headers:{ "Content-Type":"application/json", apikey:KEY, Authorization:"Bearer "+KEY },
    body: JSON.stringify({ action, pw, ...body }) });
  return r.json();
}
function toast(m){ const t=$("toast"); t.textContent=m; t.classList.add("show"); setTimeout(()=>t.classList.remove("show"),1800); }

function renderLogin(msg){
  $("app").innerHTML = `<div class="login"><h2>설교말씀 도우미</h2>
    ${msg?`<p style="color:#c0392b;font-size:13px">${esc(msg)}</p>`:""}
    <input id="pw" type="password" placeholder="관리자 비밀번호" />
    <button id="go">로그인</button></div>`;
  $("go").onclick = tryLogin;
  $("pw").onkeydown = (e)=>{ if(e.key==="Enter") tryLogin(); };
}
async function tryLogin(){
  pw = $("pw") ? $("pw").value : pw;
  try {
    const j = await call("authCheck");
    if(j.ok){ sessionStorage.setItem("admin-pw", pw); renderMain(); }
    else renderLogin("비밀번호가 틀렸어요.");
  } catch (e) {
    renderLogin("서버에 연결하지 못했어요. 잠시 후 다시 시도해 주세요.");
  }
}
function renderMain(){
  $("app").innerHTML = `<header>
      <h1>🔎 설교말씀 도우미</h1>
      <button id="reindex">🔄 색인 다시 만들기</button>
      <a href="admin.html">← 허브</a>
    </header>
    <main>
      <div class="ask">
        <input id="q" placeholder="예) 용서에 대해 목사님이 뭐라고 하셨나요?" />
        <button id="send">질문</button>
      </div>
      <div class="hint">
        <b class="h">💡 이렇게 이용하세요</b>
        <p>AI가 설교를 하나하나 찾아 답을 만들기 때문에 <b>몇 초 정도 걸릴 수 있어요.</b> 잠시만 기다려 주세요.</p>
        <p>입력창에 궁금한 점을 더 적어 <b>이어서 질문해도 됩니다.</b></p>
      </div>
      <div class="topics">
        <div class="cloud" id="cloud"></div>
        <div class="tqs" id="tqs"></div>
      </div>
      <div id="out"><div class="empty">궁금한 것을 물어보세요. 올해 설교에서 찾아 답해드립니다.</div></div>
    </main>`;
  $("send").onclick = ask;
  $("q").onkeydown = (e)=>{ if(e.key==="Enter") ask(); };
  $("reindex").onclick = reindex;
  buildCloud();
}
function buildCloud(){
  $("cloud").innerHTML = TOPICS.map((tp,i)=>`<button data-i="${i}">${esc(tp.t)}</button>`).join("");
  $("cloud").querySelectorAll("button").forEach(b=>{ b.onclick = ()=>selectTopic(+b.dataset.i, b); });
}
function selectTopic(i, btn){
  $("cloud").querySelectorAll("button").forEach(b=>b.classList.remove("on"));
  btn.classList.add("on");
  const qs = TOPICS[i].qs;
  $("tqs").innerHTML = qs.map((q,idx)=>`<button class="tq" data-q="${idx}">${esc(q)}</button>`).join("");
  // 질문 클릭 → 입력창에 채우기만 한다(자동 전송 X). 성도가 다듬어 보낸다.
  $("tqs").querySelectorAll(".tq").forEach(b=>{
    b.onclick = ()=>{ $("q").value = qs[+b.dataset.q]; $("q").focus(); toast("질문을 다듬은 뒤 '질문'을 눌러 보세요"); };
  });
}
let lastSources = [];
async function ask(){
  const message = $("q").value.trim();
  if(!message){ toast("질문을 입력하세요"); return; }
  const btn = $("send"); btn.disabled = true; btn.textContent = "찾는 중…";
  $("out").innerHTML = `<div class="empty">설교를 찾고 있어요… 잠시만 기다려 주세요 🔎</div>`;
  try {
    const j = await call("sermonChat", { message });
    if(!j.ok){ $("out").innerHTML = `<div class="empty">오류: ${esc(j.error||"")}</div>`; return; }
    lastSources = j.sources || [];
    const srcHtml = lastSources.map((s,i) => `
      <button class="src" data-i="${i}">
        <span class="src-icon">📖</span>
        <span class="src-body">
          <span class="src-title">${esc(s.title)}</span>
          <span class="src-meta">${esc(s.scripture||"")}${s.svc_date?` · ${esc(s.svc_date)}`:""}</span>
        </span>
        <span class="src-arrow">›</span>
      </button>`).join("");
    $("out").innerHTML = `
      <div class="answer">${esc(j.answer)}</div>
      ${srcHtml ? `<div class="sources">${srcHtml}</div>` : ""}
      <div class="disclaimer">※ 이 답변은 설교 아카이브를 검색한 AI 요약입니다. 정확한 내용은 원 설교를 확인하세요.</div>`;
    $("out").querySelectorAll(".src").forEach(b=>{ b.onclick = ()=>openSermon(lastSources[+b.dataset.i]); });
  } catch (e) {
    $("out").innerHTML = `<div class="empty">오류가 발생했어요. 잠시 후 다시 시도해 주세요.</div>`;
  } finally {
    btn.disabled = false; btn.textContent = "질문";
  }
}
// 출처 클릭 → 설교 정보 팝업(제목·말씀·일자·설교자 + 설교 보기·말씀 요약)
function openSermon(s){
  if(!s) return;
  const m = document.createElement("div");
  m.className = "modal-bg";
  m.innerHTML = `<div class="modal">
    <button class="modal-x" aria-label="닫기">✕</button>
    <div class="modal-rows">
      <div><span class="k">제목</span><span class="v">${esc(s.title)}</span></div>
      <div><span class="k">말씀</span><span class="v">${esc(s.scripture||"-")}</span></div>
      <div><span class="k">일자</span><span class="v">${esc(s.svc_date||"-")}</span></div>
      <div><span class="k">설교자</span><span class="v">${esc(s.preacher||"-")}</span></div>
    </div>
    <div class="modal-btns">
      <button class="mb watch">📺 설교 보기</button>
      <button class="mb summary">📄 말씀 요약</button>
    </div>
    <div class="modal-summary" id="msum" hidden></div>
  </div>`;
  document.body.appendChild(m);
  const close = ()=>m.remove();
  m.onclick = (e)=>{ if(e.target===m) close(); };
  m.querySelector(".modal-x").onclick = close;
  m.querySelector(".watch").onclick = ()=>{ window.open("https://youtube.com/watch?v="+encodeURIComponent(s.youtube_id), "_blank", "noopener"); };
  m.querySelector(".summary").onclick = async ()=>{
    const el = m.querySelector("#msum");
    el.hidden = false;
    el.textContent = "요약을 불러오는 중…";
    try {
      const j = await call("sermonSummary", { sermonId: s.youtube_id });
      el.textContent = (j.ok && j.summary) ? j.summary : (s.summary || "아직 등록된 요약이 없어요.");
    } catch (e) {
      el.textContent = s.summary || "요약을 불러오지 못했어요.";
    }
  };
}
async function reindex(){
  if(!confirm("올해 설교 전체를 다시 색인할까요? (1~2분 소요)")) return;
  const btn = $("reindex"); btn.disabled = true; btn.textContent = "색인 중…";
  try {
    const j = await call("embedSermons");
    toast(j.ok ? `✅ 색인 완료: 설교 ${j.sermons}편 · 청크 ${j.chunks}개` : "실패: "+(j.error||""));
  } catch (e) {
    toast("색인 중 오류가 발생했어요");
  } finally {
    btn.disabled = false; btn.textContent = "🔄 색인 다시 만들기";
  }
}
// 허브에서 넘어오면 자동 로그인
if(pw) tryLogin(); else renderLogin();
</script>
</body>
</html>
