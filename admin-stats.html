<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>관리자 통계 | 성경암송</title>
<link rel="icon" href="favicon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@700;800&family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet" />
<style>
  :root{
    --navy:#1a3a6b; --navy-dark:#0d1b3e; --gold:#c8a84b;
    --cream:#fdf8f0; --gray:#6b7280; --border:#ddd6c8; --light:#f3f0ea;
    --green:#2c5f2d; --error:#c0392b;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:"Noto Sans KR",sans-serif;background:var(--cream);color:#222;min-height:100vh;}
  .topbar{
    background:linear-gradient(135deg,#0d1b3e 0%,#1a3a6b 100%); color:#fff;
    padding:16px 20px; display:flex; align-items:center; justify-content:space-between;
  }
  .topbar h1{font-family:"Nanum Myeongjo",serif;font-size:1.2rem;font-weight:800;letter-spacing:.5px;}
  .topbar .logout{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.35);color:#fff;
    border-radius:999px;padding:6px 13px;font-size:.82rem;cursor:pointer;font-family:inherit;}
  .topbar .logout:hover{background:rgba(255,255,255,.28);}
  main{max-width:900px;margin:0 auto;padding:22px 16px 60px;}

  /* 로그인 */
  .login-card{max-width:360px;margin:8vh auto 0;background:#fff;border:1px solid var(--border);
    border-radius:16px;padding:30px 24px;box-shadow:0 6px 20px rgba(13,27,62,.07);text-align:center;}
  .login-card h2{font-family:"Nanum Myeongjo",serif;color:var(--navy);font-size:1.3rem;margin-bottom:8px;}
  .login-card p{color:var(--gray);font-size:.85rem;margin-bottom:20px;}
  .login-card input{width:100%;padding:12px 13px;font-size:1rem;border:1px solid var(--border);
    border-radius:10px;background:var(--cream);font-family:inherit;margin-bottom:12px;}
  .login-card input:focus{outline:none;border-color:var(--navy);background:#fff;}
  .login-card button{width:100%;padding:13px;font-size:1.02rem;font-weight:700;color:#fff;background:var(--navy);
    border:none;border-radius:12px;cursor:pointer;font-family:inherit;transition:background .15s;}
  .login-card button:hover{background:var(--navy-dark);}
  .login-err{color:var(--error);font-size:.85rem;margin-bottom:10px;min-height:1.1em;}
  .home-link{display:inline-block;margin-top:14px;color:var(--gray);font-size:.85rem;
    font-weight:700;text-decoration:none;}
  .home-link:hover{color:var(--navy);text-decoration:underline;}

  /* 카드 메뉴 */
  .section-title{font-weight:800;color:var(--navy);font-size:1.05rem;margin:6px 2px 14px;}
  .card-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .privacy-notice{background:#fff8e8;border:1px solid #e5c978;border-radius:12px;padding:12px 14px;
    color:#6f5614;font-size:.84rem;line-height:1.55;margin-bottom:14px;}
  .privacy-notice b{color:#4b390b;}
  .dash{margin-bottom:16px;}
  .dash-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:0 2px 10px;}
  .dash-title{font-weight:800;color:var(--navy);font-size:1.05rem;}
  .dash-sub{color:var(--gray);font-size:.78rem;white-space:nowrap;}
  .dash-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:12px;}
  @media (min-width:600px){ .dash-grid{grid-template-columns:repeat(4,1fr);} }
  .dash-kpi{position:relative;overflow:hidden;background:#fff;border:1px solid var(--border);border-radius:14px;
    padding:11px 12px 11px 15px;box-shadow:0 2px 10px rgba(26,58,107,.05);min-width:0;}
  .dash-kpi::before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--acc,#1a3a6b);}
  .dash-kpi .k-head{display:flex;align-items:center;gap:5px;margin-bottom:5px;min-width:0;}
  .dash-kpi .ic{font-size:14px;line-height:1;flex:none;}
  .dash-kpi .l{font-size:.74rem;color:var(--gray);line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .dash-kpi .n{font-size:1.65rem;font-weight:800;color:var(--navy);line-height:1;text-align:right;}
  .dash-kpi.k-people{--acc:#2b5fb0;} .dash-kpi.k-fire{--acc:#d98a2b;}
  .dash-kpi.k-study{--acc:#2f6b4f;} .dash-kpi.k-verse{--acc:#7a5bb0;}
  .dash-panels{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .dash-panel{background:#fff;border:1px solid var(--border);border-radius:14px;padding:13px 14px;min-width:0;}
  .dash-panel .h{font-weight:800;color:var(--navy);font-size:.92rem;margin-bottom:8px;}
  .dash-list{display:flex;flex-direction:column;gap:7px;}
  .dash-item{display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:8px;font-size:.84rem;}
  .dash-item .rank{font-weight:800;color:var(--gold);min-width:22px;}
  .dash-item .name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#333;}
  .dash-item .cnt{font-weight:800;color:var(--navy);white-space:nowrap;}
  .dash-msg{background:#fff;border:1px solid var(--border);border-radius:14px;padding:16px;text-align:center;color:var(--gray);font-size:.86rem;}
  .rep-card{display:flex;align-items:center;gap:13px;background:#fff;border:1px solid var(--border);
    border-radius:14px;padding:15px 16px;cursor:pointer;transition:transform .12s,box-shadow .12s,border-color .12s;
    box-shadow:0 2px 10px rgba(26,58,107,.06);}
  .rep-card:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(26,58,107,.14);border-color:#c3d0e8;}
  .rep-card .ic{flex:none;width:46px;height:46px;display:flex;align-items:center;justify-content:center;
    font-size:23px;background:var(--cream);border:1px solid var(--border);border-radius:12px;}
  .rep-card .rep-text{flex:1;min-width:0;}
  .rep-card .ti{font-weight:800;color:var(--navy);font-size:1rem;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .rep-card .de{color:var(--gray);font-size:.8rem;margin-top:3px;line-height:1.4;}
  .rep-card .rep-arrow{flex:none;color:#c3ccdb;font-size:24px;font-weight:700;line-height:1;}
  .rep-card:hover .rep-arrow{color:var(--navy);}
  .rep-card.soon{opacity:.55;cursor:default;}
  .rep-card.soon:hover{transform:none;box-shadow:0 2px 10px rgba(26,58,107,.06);border-color:var(--border);}
  @media (max-width:560px){ .card-grid{grid-template-columns:1fr;} .dash-panels{grid-template-columns:1fr;} }

  /* 리포트 */
  .rep-head{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
  .back-btn{background:#eef1f8;border:1.5px solid var(--navy);color:var(--navy);border-radius:999px;
    padding:7px 14px;font-size:.85rem;font-weight:700;cursor:pointer;font-family:inherit;}
  .back-btn:hover{background:var(--navy);color:#fff;}
  .rep-head h2{font-family:"Nanum Myeongjo",serif;color:var(--navy);font-size:1.2rem;}

  .filters{display:flex;flex-wrap:wrap;align-items:flex-end;gap:12px;background:#fff;border:1px solid var(--border);
    border-radius:12px;padding:14px 16px;margin-bottom:16px;}
  .filters .fld{display:flex;flex-direction:column;gap:5px;}
  .filters label{font-size:.8rem;color:var(--gray);font-weight:600;}
  .filters input[type=date]{padding:9px 11px;border:1px solid var(--border);border-radius:9px;
    background:var(--cream);font-family:inherit;font-size:.92rem;}
  .filters .go{padding:10px 20px;font-weight:700;color:#fff;background:var(--navy);border:none;
    border-radius:10px;cursor:pointer;font-family:inherit;}
  .filters .go:hover{background:var(--navy-dark);}
  .filters .quick{display:flex;gap:6px;}
  .filters .quick button{font-size:.78rem;padding:7px 10px;border:1px solid var(--border);background:#fff;
    color:var(--navy);border-radius:8px;cursor:pointer;font-family:inherit;}
  .filters .quick button:hover{background:var(--cream);}
  .chk-box{display:flex;flex-wrap:wrap;gap:6px;padding:8px;border:1px solid var(--border);
    border-radius:9px;background:var(--cream);min-width:240px;}
  .chk{display:inline-flex;align-items:center;gap:5px;font-size:.85rem;background:#fff;
    border:1px solid var(--border);border-radius:999px;padding:5px 11px;cursor:pointer;user-select:none;}
  .chk input{cursor:pointer;margin:0;}
  .chk.all{font-weight:700;color:var(--navy);}
  .chk-hint{font-size:.82rem;color:var(--gray);padding:2px 4px;}

  .summary-row{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:14px;}
  .kpi{flex:1;min-width:120px;background:#fff;border:1px solid var(--border);border-radius:12px;padding:12px 14px;text-align:center;}
  .kpi .n{font-size:1.5rem;font-weight:800;color:var(--navy);}
  .kpi .l{font-size:.76rem;color:var(--gray);margin-top:2px;white-space:nowrap;}
  .report-toolbar{display:flex;align-items:center;justify-content:space-between;gap:10px;
    font-size:.82rem;color:var(--gray);margin:2px 2px 10px;}
  .download-btn{border:1.5px solid var(--navy);background:#eef1f8;color:var(--navy);
    border-radius:999px;padding:7px 13px;font-size:.8rem;font-weight:800;cursor:pointer;font-family:inherit;white-space:nowrap;}
  .download-btn:hover{background:var(--navy);color:#fff;}
  .push-card{background:#fff;border:1px solid var(--border);border-radius:14px;padding:18px 18px 20px;box-shadow:0 2px 10px rgba(26,58,107,.06);}
  .push-lb{display:block;font-size:.82rem;color:var(--gray);font-weight:700;margin:10px 2px 5px;}
  .push-lb:first-child{margin-top:0;}
  .push-in{width:100%;padding:11px 13px;border:1px solid var(--border);border-radius:10px;
    background:var(--cream);font-family:inherit;font-size:.98rem;color:#222;}
  .push-in:focus{outline:none;border-color:var(--navy);background:#fff;}
  textarea.push-in{resize:vertical;line-height:1.5;}
  .push-fill{width:100%;padding:10px;margin-bottom:14px;font-size:.9rem;font-weight:700;
    color:var(--navy);background:#eef1f8;border:1.5px solid var(--navy);border-radius:10px;cursor:pointer;font-family:inherit;}
  .push-fill:hover{background:var(--navy);color:#fff;}
  .push-hint{font-size:.8rem;color:var(--gray);margin:9px 2px 14px;}
  .sub-stat{background:#eef4ff;border:1px solid #cfe0f5;border-radius:10px;padding:11px 13px;margin-bottom:14px;font-size:.92rem;color:var(--navy);font-weight:700;}
  .sub-stat b{font-size:1.1rem;}
  .sub-stat .ss-sub{display:block;margin-top:3px;font-size:.78rem;font-weight:600;color:var(--gray);}
  .sub-list{margin:-6px 0 14px;border:1px solid var(--border);border-radius:10px;overflow:hidden;}
  .sub-row{display:flex;align-items:center;gap:8px;padding:9px 11px;font-size:.86rem;border-top:1px solid var(--border);}
  .sub-row:first-child{border-top:none;}
  .sub-row .sr-no{color:var(--gray);font-size:.78rem;min-width:16px;}
  .sub-row .sr-name{font-weight:700;color:var(--navy);}
  .sub-row .sr-sosok{color:var(--gray);font-size:.8rem;}
  .sub-row .sr-hour{margin-left:auto;background:#eef4ff;color:var(--navy);border-radius:999px;padding:1px 8px;font-size:.76rem;font-weight:700;}
  .pl-list{display:flex;flex-direction:column;gap:10px;}
  .pl-item{border:1px solid var(--border);border-radius:11px;padding:12px 13px;background:#fafbfe;}
  .pl-item.daily{border-color:#bfe3cf;background:#f3fbf6;}
  .pl-top{display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:.78rem;color:var(--gray);margin-bottom:5px;}
  .pl-when{font-weight:700;color:var(--navy);}
  .pl-badge{background:#e7f6ee;color:#1f7a4d;border-radius:999px;padding:1px 8px;font-weight:700;}
  .pl-sent{margin-left:auto;}
  .pl-title{font-weight:800;color:#1f7a4d;font-size:.95rem;line-height:1.4;}
  .pl-msg{margin-top:5px;font-size:.86rem;color:var(--ink,#1c2430);line-height:1.6;}
  .ml-head{font-weight:800;color:var(--navy);font-size:1rem;margin:12px 2px 12px;line-height:1.4;}
  .ml-head .ml-ref{display:inline-block;font-size:.8rem;font-weight:700;color:#1f7a4d;background:#e7f6ee;border-radius:999px;padding:1px 9px;margin-left:4px;}
  .ml-q{margin-top:6px;padding-top:8px;border-top:1px dashed var(--border);font-size:.85rem;color:var(--navy);line-height:1.6;}
  #ml-week{margin-bottom:6px;}
  .push-send{width:100%;padding:14px;font-size:1.05rem;font-weight:800;color:#fff;
    background:linear-gradient(135deg,#1a3a6b 0%,#0d4a7a 100%);border:none;border-radius:12px;
    cursor:pointer;font-family:inherit;box-shadow:0 4px 14px rgba(13,74,122,.28);transition:filter .15s,transform .1s;}
  .push-send:hover{filter:brightness(1.08);}
  .push-send:active{transform:translateY(1px);}
  .push-send:disabled{opacity:.6;cursor:wait;filter:none;}
  #p-result{padding:14px 0 0;}

  .table-wrap{overflow-x:auto;background:#fff;border:1px solid var(--border);border-radius:12px;}
  table{width:100%;border-collapse:collapse;min-width:560px;}
  th,td{padding:11px 12px;text-align:center;font-size:.9rem;border-bottom:1px solid var(--light);white-space:nowrap;}
  thead th{background:var(--navy);color:#fff;font-weight:700;position:sticky;top:0;}
  tbody tr:hover{background:var(--cream);}
  td.l,th.l{text-align:left;}
  tfoot td{font-weight:800;color:var(--navy);background:var(--light);border-top:2px solid var(--border);}
  .gubun-tag{display:inline-block;font-size:.78rem;font-weight:700;padding:2px 9px;border-radius:999px;}
  .gubun-교구{background:#e7ecf5;color:var(--navy);}
  .gubun-교회학교{background:#f4e3ad;color:var(--navy-dark);}
  .msg{text-align:center;color:var(--gray);padding:30px;}
  .err{color:var(--error);}
  @media (max-width:700px){
    .topbar{padding:14px 14px;}
    .topbar h1{font-size:1.02rem;}
    main{padding:16px 12px 44px;}
    .dash-head{align-items:flex-start;flex-direction:column;gap:2px;}
    .dash-sub{white-space:normal;}
    .dash-grid{grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;}
    .dash-kpi{padding:12px 10px;}
    .dash-kpi .n{font-size:1.35rem;}
    .dash-panels{grid-template-columns:1fr;}
    .dash-panel{padding:12px;}
    .dash-item{font-size:.82rem;}
    .privacy-notice{font-size:.8rem;}
    .rep-card{padding:15px 16px;}
    .filters{padding:12px;gap:10px;}
    .filters .fld{flex:1 1 140px;}
    .filters input[type=date], .filters .go{width:100%;}
    .report-toolbar{align-items:flex-start;flex-direction:column;}
    .download-btn{width:100%;}
  }
  @media (max-width:380px){
    .dash-grid{grid-template-columns:repeat(2,minmax(0,1fr));}
    .dash-kpi .n{font-size:1.25rem;}
  }
  /* 오늘의 메시지 편집 */
  .dm-types{display:flex;gap:8px;margin-bottom:4px;}
  .dm-type{flex:1;padding:11px;border:1.5px solid var(--line);border-radius:11px;background:#fff;
    font-size:.92rem;font-weight:700;color:var(--sub);cursor:pointer;font-family:inherit;}
  .dm-type.on{border-color:var(--navy);background:#eef2f8;color:var(--navy);}
  .dm-dates{display:flex;align-items:center;gap:8px;}
  .dm-dates .push-in{margin-bottom:0;}
  .dm-sep{color:var(--sub);}
  .dm-hint{font-size:.78rem;color:var(--sub);margin:6px 2px 12px;}
  .dm-clear{width:100%;padding:11px;margin-top:8px;border:1px solid var(--line);border-radius:11px;
    background:#fff;color:var(--sub);font-size:.9rem;font-weight:700;cursor:pointer;font-family:inherit;}
  .dm-clear:hover{color:#c0392b;border-color:#e2b6b0;}
  /* 목록형 오늘의 메시지 */
  .dm-list{display:flex;flex-direction:column;gap:10px;margin-bottom:12px;}
  .dm-item{border:1px solid var(--line);border-radius:12px;padding:13px 14px;background:#fff;}
  .dm-item-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
  .dm-item-badge{font-size:.78rem;font-weight:800;padding:2px 9px;border-radius:999px;background:#fbf3d6;color:#8a6d1f;}
  .dm-item-badge.notice{background:#eef2f8;color:var(--navy);}
  .dm-item-status{font-size:.72rem;font-weight:800;padding:2px 8px;border-radius:999px;}
  .dm-item-status.live{background:#e7f6ea;color:#1f7a3d;}
  .dm-item-status.sched{background:#fff3d9;color:#8a6d1f;}
  .dm-item-status.done{background:#eef0f4;color:#8a93a5;}
  .dm-item-title{font-weight:800;color:var(--navy);font-size:.95rem;margin-bottom:3px;}
  .dm-item-body{color:var(--ink);font-size:.88rem;line-height:1.5;}
  .dm-item-period{font-size:.78rem;color:var(--sub);margin-top:6px;}
  .dm-item-actions{display:flex;gap:8px;margin-top:10px;}
  /* 10회 단위 달성 응원 문구 */
  .mm-list{display:flex;flex-direction:column;gap:11px;margin:12px 0;}
  .mm-item{border:1px solid var(--line);border-radius:12px;padding:12px;background:#fff;}
  .mm-top{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
  .mm-count{width:84px!important;margin:0!important;text-align:center;font-weight:800;color:var(--navy);}
  .mm-unit{font-size:.88rem;font-weight:800;color:var(--navy);white-space:nowrap;}
  .mm-del{margin-left:auto;border:1px solid #e2b6b0;border-radius:8px;background:#fff;color:#b94a3a;
    padding:6px 10px;font-family:inherit;font-weight:700;cursor:pointer;}
  .mm-msg{min-height:76px!important;margin:0!important;line-height:1.65;font-family:inherit;}
  .mm-actions{display:flex;gap:8px;margin-top:8px;}
  .mm-actions button{flex:1;}
  .dm-mini{padding:6px 14px;border:1px solid var(--line);border-radius:9px;background:#fff;
    font-size:.82rem;font-weight:700;color:var(--navy);cursor:pointer;font-family:inherit;}
  .dm-mini.del{color:var(--sub);}
  .dm-mini.del:hover{color:#c0392b;border-color:#e2b6b0;}
  .dm-mini:disabled{opacity:.35;cursor:default;}
  /* 인트로 슬라이드 목록 */
  .in-list{display:flex;flex-direction:column;gap:10px;margin-bottom:12px;}
  .in-item{border:1px solid var(--line);border-radius:12px;padding:12px 14px;background:#fff;}
  .in-item-main{display:flex;align-items:center;gap:12px;}
  .in-item-icon{font-size:1.7rem;flex:none;width:40px;text-align:center;}
  .in-item-tx{min-width:0;}
  .in-item-title{font-weight:800;color:var(--navy);font-size:.95rem;}
  .in-item-body{color:var(--sub);font-size:.82rem;line-height:1.4;margin-top:2px;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .in-item-actions{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;}
  .in-preview-card{width:100%;max-width:340px;text-align:center;background:#fff;
    border:1px solid var(--line);border-radius:18px;padding:34px 24px 24px;
    box-shadow:0 12px 40px rgba(13,27,62,.28);}
  .in-pv-icon{font-size:52px;line-height:1;margin-bottom:14px;}
  .in-pv-title{font-family:"Nanum Myeongjo",serif;font-weight:800;font-size:1.4rem;color:var(--navy);margin-bottom:14px;}
  .in-pv-body{color:#444;font-size:.98rem;line-height:1.65;}
  /* 미리보기 오버레이 */
  .dm-preview-ov{position:fixed;inset:0;z-index:2000;display:flex;align-items:center;justify-content:center;
    padding:24px;background:rgba(13,27,62,.45);}
  .dm-preview-card{width:100%;max-width:340px;text-align:center;background:linear-gradient(180deg,#fffdf6,#fff 65%);
    border:1.5px solid var(--gold);border-radius:18px;padding:26px 22px 22px;box-shadow:0 12px 40px rgba(13,27,62,.28);}
  .dm-preview-card.notice{background:#fff;border-color:var(--navy);}
  .dm-pv-icon{font-size:44px;line-height:1;margin-bottom:8px;}
  .dm-pv-badge{display:inline-block;margin-bottom:12px;padding:2px 12px;border-radius:999px;
    background:var(--gold);color:var(--navy-d);font-size:.74rem;font-weight:800;}
  .dm-preview-card.notice .dm-pv-badge{background:var(--navy);color:#fff;}
  .dm-pv-title{font-weight:800;color:var(--navy-d);font-size:1.1rem;margin-bottom:10px;}
  .dm-preview-card.notice .dm-pv-title{color:var(--navy);}
  .dm-pv-body{color:var(--navy-d);font-size:1rem;line-height:1.7;margin-bottom:20px;}
  .dm-preview-card.notice .dm-pv-body{color:#333;}

      <button class="push-send" id="p-send">🔔 지금 보내기</button>
      <p class="push-hint" style="margin-top:16px">매일 아침 실제로 나가는 문구(오늘의 묵상 + 이번주 말씀)를 <b>이 기기에만</b> 보내 확인합니다.</p>
      <button class="push-fill" id="p-me">📱 내 기기로만 테스트 발송</button>
      <div id="p-result" class="msg"></div>
    </div>`;
  document.getElementById("back").addEventListener("click", renderMenu);
  loadSubStat(document.getElementById("sub-stat"));
  document.getElementById("p-list").addEventListener("click", toggleSubList);
  document.getElementById("p-fill").addEventListener("click", fillLatestVerse);
  document.getElementById("p-me").addEventListener("click", async ()=>{
    const r=document.getElementById("p-result");
    const btn=document.getElementById("p-me");
    btn.disabled=true; r.className="msg"; r.textContent="이 기기의 알림 구독 확인 중...";
    try{
      const reg = navigator.serviceWorker && await navigator.serviceWorker.getRegistration();
      const sub = reg && await reg.pushManager.getSubscription();
      if(!sub){
        r.className="msg err";
        r.textContent="이 기기는 알림이 꺼져 있습니다. 앱 첫화면에서 🔔 알림을 먼저 켜주세요.";
        btn.disabled=false; return;
      }
      r.textContent="보내는 중...";
      const data=await callApi({action:"testPush",endpoint:sub.endpoint,preview:true})
        .catch(()=>({ok:false,error:"network"}));
      btn.disabled=false;
      if(data && data.ok){ r.className="msg"; r.innerHTML="✅ <b>이 기기로만</b> 보냈습니다 — 알림을 확인해보세요."; }
      else { r.className="msg err"; r.textContent="발송 실패: "+((data&&data.error)||"오류"); }
    }catch(e){ btn.disabled=false; r.className="msg err"; r.textContent="오류: "+(e&&e.message||e); }
  });
  document.getElementById("p-send").addEventListener("click", async ()=>{
    const title=document.getElementById("p-title").value.trim();
    const body=document.getElementById("p-body").value.trim();
    const r=document.getElementById("p-result");
    const btn=document.getElementById("p-send");
    if(!body){ r.className="msg err"; r.textContent="내용을 입력하세요."; return; }
    btn.disabled=true; r.className="msg"; r.textContent="보내는 중...";
    const data=await callApi({action:"sendPush",pw:getPw(),title,body,
      url:"https://gocheok.onlybible.kr/"}).catch(()=>({ok:false,error:"network"}));
    btn.disabled=false;
    if(!data.ok){
      if(data.error==="unauthorized"){ sessionStorage.removeItem(PW_KEY); renderLogin(); return; }
      r.className="msg err"; r.textContent="발송 실패: "+(data.error||"오류"); return;
    }
    r.className="msg"; r.innerHTML=`✅ 발송 완료 — 성공 <b>${data.sent}</b> · 실패 ${data.failed} · 구독 ${data.total}명`;
  });
}

    </div>`;
  document.getElementById("back").addEventListener("click", renderMenu);

}
async function loadMedLibrary(){
  const sel=document.getElementById("ml-week");
  const bd=document.getElementById("ml-body");
  try{
    const res=await fetch(SERMON_FN,{method:"POST",headers:{"Content-Type":"application/json","apikey":ANON,"Authorization":"Bearer "+ANON},body:JSON.stringify({action:"getSermons"})});
    const d=await res.json();
    const all=(d&&d.sermons)||[];
    // 7일치 묵상이 있는 설교만, 최신순
    _medSermons=all.filter(s=>Array.isArray(s.dailyMeditations)&&s.dailyMeditations.length)
      .sort((a,b)=>String(b.date||"").localeCompare(String(a.date||"")));
    if(!_medSermons.length){ sel.style.display="none"; bd.innerHTML=`<div class="msg">아직 7일치 매일 묵상이 있는 설교가 없습니다.</div>`; return; }
    sel.innerHTML=_medSermons.map((s,i)=>{
      const ref=s.memRef||s.scripture||"";
      return `<option value="${i}">${htmlEsc((s.date||"")+" · "+(s.title||"")+(ref?" ("+ref+")":""))}</option>`;
    }).join("");
    sel.addEventListener("change",()=>renderMedWeek(Number(sel.value)));
    renderMedWeek(0);
  }catch(e){ bd.innerHTML=`<div class="msg err">불러오기 실패: ${(e&&e.message)||e}</div>`; }
}
function renderMedWeek(i){
  const bd=document.getElementById("ml-body");
  const s=_medSermons[i]; if(!s){ bd.innerHTML=""; return; }
  const DAYS=["일","월","화","수","목","금","토"];
  const dm=s.dailyMeditations||[];
  bd.innerHTML=`<div class="ml-head">📖 ${htmlEsc(s.title||"")} <span class="ml-ref">${htmlEsc(s.memRef||s.scripture||"")}</span></div>`
    +`<div class="pl-list">`+dm.map((m,k)=>`
      <div class="pl-item daily">
        <div class="pl-top"><span class="pl-badge">${DAYS[k]||("D"+(k+1))}</span>
          <span class="pl-when">${htmlEsc(m.heading||"")}</span></div>
        ${m.message?`<div class="pl-msg">${htmlEsc(m.message)}</div>`:""}
        ${m.question?`<div class="ml-q">💬 ${htmlEsc(m.question)}</div>`:""}
      </div>`).join("")+`</div>`;
}

async function loadPushLog(){
  const el=document.getElementById("pl-body");
  const d=await callApi({action:"pushHistory",pw:getPw(),limit:60}).catch(()=>({ok:false,error:"network"}));
  if(!d||!d.ok){
    if(d&&d.error==="unauthorized"){ sessionStorage.removeItem(PW_KEY); renderLogin(); return; }
    el.innerHTML=`<div class="msg err">불러오기 실패: ${(d&&d.error)||"오류"}</div>`; return;
  }
  const rows=d.rows||[];
  if(!rows.length){ el.innerHTML=`<div class="msg">아직 발송 이력이 없습니다.</div>`; return; }
  const fmt=(ts)=>{ try{ const t=new Date(ts); const k=new Date(t.getTime()+9*3600*1000);
    return `${k.getUTCFullYear()}.${String(k.getUTCMonth()+1).padStart(2,"0")}.${String(k.getUTCDate()).padStart(2,"0")} (${["일","월","화","수","목","금","토"][k.getUTCDay()]}) ${String(k.getUTCHours()).padStart(2,"0")}:${String(k.getUTCMinutes()).padStart(2,"0")}`;
  }catch(_){ return ts||""; } };

async function fillLatestVerse(){
  const r=document.getElementById("p-result");
  // ① 서버가 만드는 실제 발송 문구(오늘의 묵상 + 이번주 말씀)를 그대로 받아 채운다.
  try{
    const p=await callApi({action:"pushPreview"});
    if(p&&p.ok&&p.body){
      document.getElementById("p-title").value=p.title||"성경암송";
      document.getElementById("p-body").value=p.body;
      if(r){ r.className="msg"; r.textContent="오늘 나갈 문구(묵상+말씀)를 채웠습니다. 확인 후 보내세요."; }
      return;
    }
  }catch{}
  // ② 실패 시 예전 방식(말씀만) 폴백
  try{
    // 데이터는 CMS 단일 소스(DB=getVerses) 우선, 없으면 verses.json 폴백
    let verses=null;
    try{ const d=await callApi({action:"getVerses"}); if(d&&d.ok) verses=d.verses; }catch{}
    if(!verses||!verses.length){ const res=await fetch("verses.json",{cache:"no-store"}); verses=((await res.json()).verses)||[]; }
    const list=verses.filter(v=>v.date).map(v=>({v,t:Date.parse(v.date)})).sort((a,b)=>a.t-b.t);
    if(!list.length){ if(r){r.className="msg err";r.textContent="말씀 데이터를 찾지 못했습니다.";} return; }
    const now=Date.now(); let cur=list[0];
    for(const x of list){ if(x.t<=now) cur=x; else break; }
    const ref=cur.v.refShort||cur.v.refFull||"";
    const text=cur.v.text||"";
    document.getElementById("p-title").value="성경암송";
    document.getElementById("p-body").value=ref?`${text} (${ref})`:text;
    if(r){ r.className="msg"; r.textContent="이번 주 말씀을 채웠습니다. 확인 후 보내세요."; }
  }catch(e){ if(r){r.className="msg err";r.textContent="불러오기 실패: "+(e&&e.message?e.message:e);} }
}

function mmDraw(){

  mmList.push({count:Math.max(10,Math.ceil((max+1)/10)*10),message:"오늘 {count}회 달성!\n말씀을 향한 귀한 걸음을 응원합니다. 🙌"});
  mmDraw();
  const items=document.querySelectorAll(".mm-item"); if(items.length) items[items.length-1].scrollIntoView({behavior:"smooth",block:"center"});
}
function mmPreview(i){
  const x=mmList[i]; const count=Number(x.count)||0; const message=String(x.message||"").trim();
  const r=document.getElementById("mm-result");
  if(!message){ r.className="msg err"; r.textContent="미리볼 문구를 입력하세요."; return; }
  const ov=document.createElement("div"); ov.className="dm-preview-ov";
  ov.innerHTML=`<div class="dm-preview-card cheer"><div class="dm-pv-icon">🎉</div>
    <div class="dm-pv-badge">오늘 ${count}회 달성</div>
    <div class="dm-pv-body">${dmEsc(message.replace(/\{count\}/g,String(count))).replace(/\n/g,"<br>")}</div>
    <button class="dm-pv-ok">계속 도전하기 💪</button></div>`;
  document.body.appendChild(ov); const close=()=>ov.remove();
  ov.querySelector(".dm-pv-ok").addEventListener("click",close); ov.addEventListener("click",e=>{if(e.target===ov)close();});
}
function mmValidated(){
  const out=[]; const seen=new Set();
  for(const x of mmList){
    const count=Number(x.count); const message=String(x.message||"").trim();
    if(!Number.isInteger(count)||count<10||count%10!==0) throw new Error("횟수는 10 이상의 10단위로 입력하세요.");
    if(seen.has(count)) throw new Error(`${count}회가 중복되었습니다.`);
    if(!message) throw new Error(`${count}회 응원 문구를 입력하세요.`);
    seen.add(count); out.push({count,message});
  }
  return out.sort((a,b)=>a.count-b.count);
}
async function mmSave(){
  const r=document.getElementById("mm-result"); let next;
  try{ next=mmValidated(); }catch(e){ r.className="msg err"; r.textContent=e.message; return; }
  const btn=document.getElementById("mm-save"); btn.disabled=true; r.className="msg"; r.textContent="저장 중...";
  const d=await callApi({action:"saveConfig",pw:getPw(),key:"milestoneMessages",value:next}).catch(()=>({ok:false,error:"network"}));
  btn.disabled=false;
  if(d.error==="unauthorized"){ sessionStorage.removeItem(PW_KEY); renderLogin(); return; }
  if(!d.ok){ r.className="msg err"; r.textContent="저장 실패: "+(d.error||"오류"); return; }
  mmList=next; mmDraw(); r.className="msg"; r.innerHTML=`✅ 저장 완료 — <b>${next.length}개 단계</b>. 성도 앱은 재접속 후 반영됩니다.`;
}

// ---------- 질문·제안 게시판 관리 ----------
function boardT(iso){ try{ const k=new Date(new Date(iso).getTime()+9*3600*1000); const z=n=>String(n).padStart(2,"0"); return `${k.getUTCMonth()+1}/${k.getUTCDate()} ${z(k.getUTCHours())}:${z(k.getUTCMinutes())}`; }catch(e){ return ""; } }
function boardE(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\n/g,"<br>"); }
function renderBoardAdmin(){
  app.innerHTML=`
    <style>
      .ba-post{border:1px solid #dde3ee;border-radius:12px;padding:12px 14px;margin-bottom:12px;background:#fff}
      .ba-post.hidden,.ba-reply.hidden{opacity:.55}
      .ba-meta{font-size:12px;color:#5c6a80;margin-bottom:5px}
      .ba-meta b{color:#1a3a6b}
      .ba-reply{margin-top:9px;padding:8px 10px;border-radius:9px;background:#f4f6fb;border-left:3px solid #dde3ee;font-size:14px}
      .ba-reply.adm{background:#fdf9ef;border-left-color:#c8a24b}
      .board-badge{display:inline-block;background:#c8a24b;color:#fff;font-size:10px;font-weight:800;padding:1px 7px;border-radius:10px}
      .ba-actions{display:flex;gap:6px;margin-top:8px}
      .ba-actions button{padding:4px 10px;border:1px solid #dde3ee;background:#fff;border-radius:8px;font-size:12px;cursor:pointer}
      .ba-del{color:#b94a3a;border-color:#e6c3bc!important}
      .ba-reply-row{display:flex;gap:6px;margin-top:10px}
      .ba-in{flex:1;padding:8px 10px;border:1.5px solid #dde3ee;border-radius:9px;font-size:13px;font-family:inherit}
      .ba-reply-btn{padding:0 14px;border:none;border-radius:9px;background:#1a3a6b;color:#fff;font-weight:700;font-size:13px;cursor:pointer}
    </style>
    <div class="rep-head">
      <button class="back-btn" id="back">← 메뉴</button>
      <h2>💬 게시판 관리</h2>
    </div>
    <div class="push-card">
      <p class="push-hint">숨김 글도 모두 표시됩니다. 여기서 다는 답글은 <b>관리자</b> 배지가 붙어요.</p>
      <button class="push-fill" id="ba-refresh">🔄 새로고침</button>
      <div id="ba-list"><p style="text-align:center;color:#888;padding:16px">불러오는 중...</p></div>
    </div>`;
  document.getElementById("back").addEventListener("click", renderMenu);
  document.getElementById("ba-refresh").addEventListener("click", loadBoardAdmin);
  loadBoardAdmin();
}
async function loadBoardAdmin(){
  const box=document.getElementById("ba-list");
  const d=await callApi({action:"boardList",pw:getPw()}).catch(()=>({ok:false,error:"network"}));
  if(d.error==="unauthorized"){ sessionStorage.removeItem(PW_KEY); renderLogin(); return; }
  const posts=(d&&d.posts)||[];
  if(!posts.length){ box.innerHTML=`<p style="text-align:center;color:#888;padding:20px 0">아직 글이 없습니다.</p>`; return; }
  box.innerHTML=posts.map(p=>{
    const replies=(p.replies||[]).map(r=>`
      <div class="ba-reply${r.is_admin?" adm":""}${(r.hidden||r.deleted)?" hidden":""}">
        <div class="ba-meta">${r.is_admin?'<span class="board-badge">관리자</span>':`<b>${boardE(r.name)}</b>`} · ${boardT(r.created_at)}${r.hidden?' · <span style="color:#b94a3a">숨김</span>':''}${r.deleted?' · <span style="color:#b94a3a">본인삭제</span>':''}</div>
        <div>${boardE(r.content)}</div>
        <div class="ba-actions">
          <button data-kind="reply" data-id="${r.id}" data-act="${r.hidden?'show':'hide'}">${r.hidden?'숨김해제':'숨기기'}</button>
          ${r.deleted?`<button data-kind="reply" data-id="${r.id}" data-act="undelete">복구</button>`:''}
          <button data-kind="reply" data-id="${r.id}" data-act="delete" class="ba-del">완전삭제</button>
        </div>
      </div>`).join("");
    return `
      <div class="ba-post${(p.hidden||p.deleted)?" hidden":""}">
        <div class="ba-meta"><b>${boardE(p.name)}</b> · ${boardT(p.created_at)}${p.hidden?' · <span style="color:#b94a3a">숨김</span>':''}${p.deleted?' · <span style="color:#b94a3a">본인삭제</span>':''}</div>
        <div>${boardE(p.content)}</div>
        ${replies}
        <div class="ba-reply-row">
          <input class="ba-in" placeholder="관리자 답글 달기" maxlength="2000" />
          <button class="ba-reply-btn" data-id="${p.id}">답글</button>
        </div>
        <div class="ba-actions">
          <button data-kind="post" data-id="${p.id}" data-act="${p.hidden?'show':'hide'}">${p.hidden?'숨김해제':'숨기기'}</button>
          ${p.deleted?`<button data-kind="post" data-id="${p.id}" data-act="undelete">복구</button>`:''}
          <button data-kind="post" data-id="${p.id}" data-act="delete" class="ba-del">완전삭제</button>
        </div>
      </div>`;
  }).join("");
  box.querySelectorAll(".ba-actions button").forEach(b=>b.addEventListener("click",()=>moderateBoard(b)));
  box.querySelectorAll(".ba-reply-btn").forEach(b=>b.addEventListener("click",()=>adminBoardReply(b)));
}
async function moderateBoard(btn){
  if(btn.dataset.act==="delete" && !confirm("정말 삭제할까요? 되돌릴 수 없습니다.")) return;
  const d=await callApi({action:"boardModerate",pw:getPw(),kind:btn.dataset.kind,id:Number(btn.dataset.id),op:btn.dataset.act}).catch(()=>({ok:false}));
  if(d.error==="unauthorized"){ sessionStorage.removeItem(PW_KEY); renderLogin(); return; }
  loadBoardAdmin();
}
async function adminBoardReply(btn){
  const el=btn.closest(".ba-post").querySelector(".ba-in"); const content=el.value.trim();
  if(!content){ el.focus(); return; }
  btn.disabled=true;
  const d=await callApi({action:"boardReply",pw:getPw(),post_id:Number(btn.dataset.id),content}).catch(()=>({ok:false}));
  if(d.error==="unauthorized"){ sessionStorage.removeItem(PW_KEY); renderLogin(); return; }
  loadBoardAdmin();
}

// ---------- 설교/말씀 관리(CMS) ----------
function isoDateInput(d){ // 'YYYY-MM-DDTHH:mm' → date input용 'YYYY-MM-DD'
  if(!d) return ""; const x=new Date(d); if(isNaN(x)) return "";
  return x.toISOString().slice(0,10);
}
async function renderContent(){
  app.innerHTML=`
    <div class="rep-head">
      <button class="back-btn" id="back">← 메뉴</button>
      <h2>📖 설교/말씀 관리</h2>
    </div>
    <div id="cms-body"><div class="msg">불러오는 중...</div></div>`;
  document.getElementById("back").addEventListener("click", renderMenu);
  loadContentList();
}
async function loadContentList(selNo){
  const body=document.getElementById("cms-body");
  const data=await callApi({action:"getVerses"}).catch(()=>({ok:false,error:"network"}));
  const list=(data&&data.verses)||[];
  const opts=`<option value="">+ 새 말씀 추가</option>`+list.map(v=>`<option value="${v.no}">${v.no}. ${htmlEsc(v.refShort||"")} — ${htmlEsc(v.sermonTitle||"")}</option>`).join("");
  body.innerHTML=`
    <div class="push-card">
      <label class="push-lb">편집할 말씀 선택</label>
      <select id="c-sel" class="push-in">${opts}</select>
      ${list.length? "" : `<p class="push-hint">아직 DB에 말씀이 없어요. 아래 '초기 적재'로 verses.json을 불러오세요.</p>
        <button class="push-fill" id="c-seed">⬇️ verses.json → DB 초기 적재</button>`}
      <hr style="border:none;border-top:1px solid var(--border);margin:14px 0;">
      <label class="push-lb">순번(no) *</label><input id="c-no" class="push-in" inputmode="numeric" placeholder="예: 27">
      <label class="push-lb">날짜(주일) *</label><input id="c-date" class="push-in" type="date">
      <label class="push-lb">출처(짧게, refShort) *</label><input id="c-refshort" class="push-in" placeholder="예: 딤전 1:11">
      <label class="push-lb">출처(전체, refFull)</label><input id="c-reffull" class="push-in" placeholder="예: 디모데전서 1장 11절">
      <label class="push-lb">말씀 본문 *</label><textarea id="c-text" class="push-in" rows="3"></textarea>
      <label class="push-lb">영어 출처(NIV, 선택)</label><input id="c-refen" class="push-in" placeholder="예: 1 Timothy 1:11">
      <label class="push-lb">영어 본문(NIV, 선택)</label><textarea id="c-texten" class="push-in" rows="3"></textarea>
      <button class="push-fill" id="c-gen-niv">🤖 NIV 생성 (AI)</button>
      <p class="push-hint">AI가 만든 본문은 실제 NIV와 다를 수 있어요. 성경과 대조·검수 후 저장하세요. 영어 본문이 있는 구절만 앱에서 한/영 전환이 나타납니다.</p>
      <label class="push-lb">힌트(선택)</label><input id="c-hint" class="push-in" placeholder="예: 이 OOO OO">
      <label class="push-lb">설교 제목</label><input id="c-sermon" class="push-in" placeholder="예: 유리 보석에 속지 마십시오">
      <label class="push-lb">설교자</label><input id="c-pastor" class="push-in" placeholder="예: 차동혁 담임목사">
      <label class="push-lb">설교 영상 URL</label><input id="c-url" class="push-in" placeholder="https://www.youtube.com/...">
      <label class="chk" style="margin:10px 0;"><input type="checkbox" id="c-active" checked> 활성(앱에 표시)</label>
      <button class="push-send" id="c-save">💾 저장</button>
      <div id="c-result" class="msg"></div>
    </div>`;
  const sel=document.getElementById("c-sel");
  function fill(v){
    document.getElementById("c-no").value=v?v.no:"";
    document.getElementById("c-date").value=v?isoDateInput(v.date):"";
    document.getElementById("c-refshort").value=v?(v.refShort||""):"";
    document.getElementById("c-reffull").value=v?(v.refFull||""):"";
    document.getElementById("c-text").value=v?(v.text||""):"";
    document.getElementById("c-refen").value=v?(v.refEn||""):"";
    document.getElementById("c-texten").value=v?(v.textEn||""):"";
    document.getElementById("c-hint").value=v?(v.hintText||""):"";
    document.getElementById("c-sermon").value=v?(v.sermonTitle||""):"";
    document.getElementById("c-pastor").value=v?(v.pastor||""):"";
    document.getElementById("c-url").value=v?(v.url||""):"";
    document.getElementById("c-active").checked=true;
  }
  sel.addEventListener("change",()=>{ const v=list.find(x=>String(x.no)===sel.value); fill(v); });
  if(selNo!=null){ sel.value=String(selNo); fill(list.find(x=>String(x.no)===String(selNo))); }
  const seed=document.getElementById("c-seed");
  if(seed) seed.addEventListener("click",async()=>{
    seed.disabled=true; seed.textContent="적재 중...";
    const r=await callApi({action:"seedVerses",pw:getPw()}).catch(()=>({ok:false,error:"network"}));
    if(r.ok){ alert("초기 적재 완료: "+r.count+"개"); loadContentList(); }
    else { seed.disabled=false; seed.textContent="⬇️ verses.json → DB 초기 적재"; alert("실패: "+(r.error||"오류")); }
  });
  const gen=document.getElementById("c-gen-niv");
  gen.addEventListener("click",async()=>{
    const refShort=document.getElementById("c-refshort").value.trim();
    const refFull=document.getElementById("c-reffull").value.trim();
    const text=document.getElementById("c-text").value.trim();
    const r=document.getElementById("c-result");
    if(!refShort&&!text){ r.className="msg err"; r.textContent="먼저 출처(짧게)나 말씀 본문을 입력하세요."; return; }
    if(document.getElementById("c-texten").value.trim() && !confirm("이미 영어 본문이 있어요. AI 생성 결과로 덮어쓸까요?")) return;
    gen.disabled=true; gen.textContent="생성 중... (10초쯤 걸려요)"; r.className="msg"; r.textContent="";
    const data=await callApi({action:"generateNiv",pw:getPw(),refShort,refFull,text}).catch(()=>({ok:false,error:"network"}));
    gen.disabled=false; gen.textContent="🤖 NIV 생성 (AI)";
    if(!data.ok){ if(data.error==="unauthorized"){sessionStorage.removeItem(PW_KEY);renderLogin();return;} r.className="msg err"; r.textContent="생성 실패: "+(data.error||"오류"); return; }
    document.getElementById("c-refen").value=data.refEn;
    document.getElementById("c-texten").value=data.textEn;
    r.className="msg"; r.textContent="✅ 생성했어요. 실제 NIV 성경과 대조·검수한 뒤 저장하세요.";
  });
  document.getElementById("c-save").addEventListener("click",async()=>{
    const verse={
      no:document.getElementById("c-no").value.trim(),
      date:document.getElementById("c-date").value ? document.getElementById("c-date").value+"T00:00:00+09:00" : null,
      refShort:document.getElementById("c-refshort").value.trim(),
      refFull:document.getElementById("c-reffull").value.trim(),
      text:document.getElementById("c-text").value.trim(),
      refEn:document.getElementById("c-refen").value.trim(),
      textEn:document.getElementById("c-texten").value.trim(),
      hintText:document.getElementById("c-hint").value.trim(),
      sermonTitle:document.getElementById("c-sermon").value.trim(),
      pastor:document.getElementById("c-pastor").value.trim(),
      url:document.getElementById("c-url").value.trim(),
      is_active:document.getElementById("c-active").checked
    };
    const r=document.getElementById("c-result");
    if(!verse.no||!verse.refShort||!verse.text){ r.className="msg err"; r.textContent="순번·출처(짧게)·말씀 본문은 필수예요."; return; }
    if(verse.textEn&&!verse.refEn){ r.className="msg err"; r.textContent="영어 본문이 있으면 영어 출처도 입력하세요. (예: John 3:16)"; return; }
    // 실수 방지: 저장 전 관리자 비밀번호 재확인
    const confirmPw = prompt("⚠️ 저장하면 앱 전체(목록·이번 주 말씀·알림)에 즉시 반영됩니다.\n확인을 위해 관리자 비밀번호를 다시 입력하세요:");
    if(confirmPw === null) return; // 취소
    if(confirmPw !== getPw()){ r.className="msg err"; r.textContent="비밀번호가 일치하지 않아 저장을 취소했습니다."; return; }
    const btn=document.getElementById("c-save"); btn.disabled=true; r.className="msg"; r.textContent="저장 중...";
    const data=await callApi({action:"saveVerse",pw:confirmPw,verse}).catch(()=>({ok:false,error:"network"}));
    btn.disabled=false;
    if(!data.ok){ if(data.error==="unauthorized"){sessionStorage.removeItem(PW_KEY);renderLogin();return;} r.className="msg err"; r.textContent="저장 실패: "+(data.error||"오류"); return; }
    r.className="msg"; r.textContent="✅ 저장되었습니다.";
    loadContentList(verse.no);
  });
}

// ---------- 핵심 암송(긴 본문) 관리 ----------
async function renderPassages(){
  app.innerHTML=`
    <div class="rep-head">
      <button class="back-btn" id="back">← 메뉴</button>
      <h2>📜 내 안에 거하는 말씀 관리</h2>
    </div>
    <div id="pg-body"><div class="msg">불러오는 중...</div></div>`;
  document.getElementById("back").addEventListener("click", renderMenu);
  loadPassageList();
}
async function loadPassageList(selId){
  const body=document.getElementById("pg-body");
  const data=await callApi({action:"getPassages"}).catch(()=>({ok:false,error:"network"}));
  const list=(data&&data.passages)||[];
  const opts=`<option value="">+ 새 본문 추가</option>`+list.map(p=>`<option value="${p.id}">${p.id}. ${htmlEsc(p.title||"")}</option>`).join("");
  // 공개 플래그 현재값
  const cfg=await callApi({action:"getConfig",key:"passagesPublic"}).catch(()=>({value:null}));
  const isPublic=!!(cfg&&cfg.value);
  body.innerHTML=`
    <div class="push-card">
      <button class="push-send" id="pg-open-test" style="margin-bottom:6px;">▶ 암송 화면 열기 (테스트)</button>
      <p class="push-hint">새 탭에서 실제 암송 화면이 바로 열립니다. 어드민 테스트용이며, 사용자에게는 아래 '사용자 공개'를 켜야 노출됩니다.</p>
      <hr style="border:none;border-top:1px solid var(--border);margin:14px 0;">
      <label class="push-lb">사용자 공개</label>
      <label class="chk" style="margin:6px 0;"><input type="checkbox" id="pg-public" ${isPublic?"checked":""}> 홈 화면에 '📜 내 안에 거하는 말씀' 노출(끄면 위 '▶ 암송 화면 열기'로 어드민만 테스트)</label>
      <div id="pg-public-msg" class="msg"></div>
      <hr style="border:none;border-top:1px solid var(--border);margin:14px 0;">
      <label class="push-lb">편집할 본문 선택</label>
      <select id="pg-sel" class="push-in">${opts}</select>
      <hr style="border:none;border-top:1px solid var(--border);margin:14px 0;">
      <label class="push-lb">제목 *</label><input id="pg-title" class="push-in" placeholder="예: 주기도문">
      <label class="push-lb">출처(선택)</label><input id="pg-ref" class="push-in" placeholder="예: 마 6:9-13">
      <label class="push-lb">분류(선택)</label><input id="pg-cat" class="push-in" placeholder="예: 기도문 / 신앙고백 / 시편 / 주제">
      <label class="push-lb">정렬 순서(숫자, 작을수록 위)</label><input id="pg-order" class="push-in" inputmode="numeric" placeholder="0">
      <label class="push-lb">본문 — <b>한 줄 = 한 번에 외울 분량(마디)</b> *</label>
      <textarea id="pg-lines" class="push-in" rows="8" placeholder="하늘에 계신 우리 아버지여 이름이 거룩히 여김을 받으시오며&#10;나라가 임하시오며 뜻이 하늘에서 이루어진 것 같이 땅에서도 이루어지이다&#10;오늘 우리에게 일용할 양식을 주시옵고 ..."></textarea>
      <p class="push-hint">한 줄에 <b>한 번에 암송할 분량</b>씩 입력하세요. 그 한 줄이 앱에서 마디 하나가 됩니다(짧으면 짧게, 길면 길게 관리자가 직접 조절). 줄바꿈이 곧 마디 경계이고, 빈 줄은 건너뜁니다.</p>
      <label class="chk" style="margin:10px 0;"><input type="checkbox" id="pg-active" checked> 활성(목록에 표시)</label>
      <button class="push-send" id="pg-save">💾 저장</button>
      <button class="dm-clear" id="pg-del" style="display:none;">🗑️ 이 본문 삭제</button>
      <div id="pg-result" class="msg"></div>
    </div>`;
  const sel=document.getElementById("pg-sel");
  function fill(p){
    document.getElementById("pg-title").value=p?(p.title||""):"";
    document.getElementById("pg-ref").value=p?(p.ref||""):"";
    document.getElementById("pg-cat").value=p?(p.category||""):"";
    document.getElementById("pg-order").value=p?(p.sortOrder??""):"";
    document.getElementById("pg-lines").value=p?((p.lines||[]).join("\n")):"";
    document.getElementById("pg-active").checked=true;
    document.getElementById("pg-del").style.display=p?"block":"none";
  }
  sel.addEventListener("change",()=>{ const p=list.find(x=>String(x.id)===sel.value); fill(p); });
  if(selId!=null){ sel.value=String(selId); fill(list.find(x=>String(x.id)===String(selId))); }
  // 암송 화면 테스트 열기(새 탭, 어드민 전용)
  document.getElementById("pg-open-test").addEventListener("click",()=>window.open("./?passages=1","_blank","noopener"));
  // 공개 토글
  document.getElementById("pg-public").addEventListener("change",async(e)=>{
    const msg=document.getElementById("pg-public-msg"); msg.className="msg"; msg.textContent="저장 중...";
    const r=await callApi({action:"saveConfig",pw:getPw(),key:"passagesPublic",value:e.target.checked}).catch(()=>({ok:false,error:"network"}));
    if(!r.ok){ if(r.error==="unauthorized"){sessionStorage.removeItem(PW_KEY);renderLogin();return;} msg.className="msg err"; msg.textContent="실패: "+(r.error||"오류"); e.target.checked=!e.target.checked; return; }
    msg.className="msg"; msg.textContent=e.target.checked?"✅ 사용자에게 공개됩니다.":"✅ 숨김(어드민 미리보기만).";
  });
  // 저장
  document.getElementById("pg-save").addEventListener("click",async()=>{
    const lines=document.getElementById("pg-lines").value.split(/\r?\n/).map(s=>s.trim()).filter(Boolean);

function weekStart(d){
  const x=new Date(d);
  const day=x.getDay();
  const diff=day===0?6:day-1;
  x.setDate(x.getDate()-diff);
  return x;
}
function sumStatsList(list){
  return (list||[]).reduce((a,r)=>({

    voice:a.voice+(r.voice||0),

}

function ymd(d){
  const z=n=>String(n).padStart(2,"0");
  return d.getFullYear()+"-"+z(d.getMonth()+1)+"-"+z(d.getDate());
}
function fileDate(){
  return ymd(new Date()).replaceAll("-","");
}
function rangeForName(from,to){
  if(!from&&!to) return "전체";
  return (from||"처음")+"_"+(to||"오늘");
}
function csvEscape(v){
  const s=String(v==null?"":v);
  return /[",\r\n]/.test(s) ? `"${s.replaceAll('"','""')}"` : s;
}
function downloadCsv(filename, headers, rows){
  const lines=[headers, ...rows].map(row=>row.map(csvEscape).join(","));
  const blob=new Blob(["\ufeff"+lines.join("\r\n")],{type:"text/csv;charset=utf-8"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;
  a.download=filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}
function attachCsvButton(id, filename, headers, rows){
  const btn=document.getElementById(id);
  if(!btn) return;
  btn.addEventListener("click",()=>downloadCsv(filename,headers,rows));
}

  const build=(arr)=>{(arr||[]).forEach(v=>{
    const label=[v.refShort||v.refFull||("No."+v.no), v.sermonTitle].filter(Boolean).join(" · ");
    VERSE_MAP[String(Number(v.no))]=label;
  });};
  // 1) DB(getVerses) 우선 — CMS 편집 반영
  try{ const d=await callApi({action:"getVerses"}); if(d&&d.ok) build(d.verses); }catch{}
  // 2) 폴백: 같은 도메인의 verses.json
  if(!Object.keys(VERSE_MAP).length){
    try{ const res=await fetch("verses.json?v="+Date.now(),{cache:"no-cache"}); build((await res.json()).verses); }catch{}
  }
  return VERSE_MAP;
}
function verseLabel(map,no){
  const key=String(Number(no));
  return map[key] || ("No."+no);
}

async function callVerses(from,to){
  return callApi({ action:"verses", pw:getPw(), from:from||"", to:to||"" });
}

function renderVerses(){
  const today=new Date();
  const monthStart=new Date(today.getFullYear(),today.getMonth(),1);
  app.innerHTML=`
    <div class="rep-head">
      <button class="back-btn" id="back">← 메뉴</button>
      <h2>📖 구절별 현황</h2>
    </div>
    <div class="filters">
      <div class="fld"><label>시작일 (From)</label><input type="date" id="from" value="${ymd(monthStart)}"></div>
      <div class="fld"><label>종료일 (To)</label><input type="date" id="to" value="${ymd(today)}"></div>
      <button class="go" id="go">조회</button>
      <div class="quick">
        <button data-q="all">전체기간</button>
        <button data-q="month">이번 달</button>
        <button data-q="week">최근 7일</button>
      </div>
    </div>
    <div id="result"><div class="msg">기간을 선택하고 <b>조회</b>를 누르세요.</div></div>`;
  document.getElementById("back").addEventListener("click",renderMenu);
  document.getElementById("go").addEventListener("click",runVerses);
  document.querySelectorAll(".quick button").forEach(b=>b.addEventListener("click",()=>{
    const q=b.dataset.q,f=document.getElementById("from"),t=document.getElementById("to"),now=new Date();
    if(q==="all"){f.value="";t.value="";}
    else if(q==="month"){f.value=ymd(new Date(now.getFullYear(),now.getMonth(),1));t.value=ymd(now);}
    else if(q==="week"){const w=new Date(now);w.setDate(w.getDate()-6);f.value=ymd(w);t.value=ymd(now);}
    runVerses();
  }));
  runVerses();
}

async function runVerses(){
  const from=document.getElementById("from").value;
  const to=document.getElementById("to").value;
  const result=document.getElementById("result");
  result.innerHTML=`<div class="msg">불러오는 중...</div>`;
  const [map,data]=await Promise.all([
    loadVerseMap(),
    callVerses(from,to).catch(()=>({ok:false,error:"network"}))
  ]);
  if(!data.ok){
    if(data.error==="unauthorized"){sessionStorage.removeItem(PW_KEY);renderLogin();return;}
    result.innerHTML=`<div class="msg err">조회 실패: ${data.error||"오류"}</div>`;return;
  }
  const list=data.list||[];
  if(!list.length){result.innerHTML=`<div class="msg">해당 기간에 기록이 없습니다.</div>`;return;}
  const sum=list.reduce((a,r)=>({count:a.count+r.count}),{count:0});
  const rangeTxt=(from||to)?`${from||"처음"} ~ ${to||"오늘"}`:"전체 기간";
  const rows=list.map(r=>`
    <tr>
      <td>${r.no}</td>
      <td class="l">${verseLabel(map,r.no)}</td>
      <td>${r.participants}</td>
      <td><b>${r.count}</b></td>
    </tr>`).join("");
  result.innerHTML=`
    <div class="summary-row">
      <div class="kpi"><div class="n">${list.length}</div><div class="l">사용된 구절 수</div></div>
      <div class="kpi"><div class="n">${sum.count}</div><div class="l">총 참여횟수</div></div>
    </div>
    <div class="report-toolbar">
      <span>기간: <b>${rangeTxt}</b></span>
      <button class="download-btn" id="download-verses">CSV 다운로드</button>
    </div>
    <div class="table-wrap"><table>
      <thead><tr><th>말씀 순번</th><th class="l">말씀</th><th>참여자</th><th>참여횟수</th></tr></thead>
      <tbody>${rows}</tbody>
      <tfoot><tr><td></td><td class="l">합계</td><td></td><td>${sum.count}</td></tr></tfoot>
    </table></div>`;
  attachCsvButton(
    "download-verses",
    `성경암송_구절별현황_${rangeForName(from,to)}_${fileDate()}.csv`,
    ["말씀순번","말씀","참여자","참여횟수"],
    list.map(r=>[r.no,verseLabel(map,r.no),r.participants,r.count])
      .concat([["","합계","",sum.count]])
  );
}

// ---------- 리포트 4: 도전 현황 (공개 ranking 엔드포인트 재사용) ----------
async function callChallengeRanking(from,to){
  return callApi({ action:"ranking", from:from||"", to:to||"" });
}

function renderChallengeReport(){
  const today=new Date();
  const monthStart=new Date(today.getFullYear(),today.getMonth(),1);
  app.innerHTML=`
    <div class="rep-head">
      <button class="back-btn" id="back">← 메뉴</button>
      <h2>🔥 도전 현황</h2>
    </div>
    <div class="filters">
      <div class="fld"><label>시작일 (From)</label><input type="date" id="from" value="${ymd(monthStart)}"></div>
      <div class="fld"><label>종료일 (To)</label><input type="date" id="to" value="${ymd(today)}"></div>
      <div class="fld"><label>구분</label><select id="gubun"><option>전체</option><option>교구</option><option>교회학교</option></select></div>
      <button class="go" id="go">조회</button>
      <div class="quick">
        <button data-q="all">전체기간</button>
        <button data-q="month">이번 달</button>
        <button data-q="week">최근 7일</button>
      </div>
      <div class="fld" style="flex-basis:100%;"><label>교구/교회학교 (다중 선택)</label>
        <div id="sosok-box" class="chk-box"></div></div>
    </div>
    <div id="result"><div class="msg">조건을 선택하고 <b>조회</b>를 누르세요.</div></div>`;

  const gubunSel=document.getElementById("gubun");
  const sosokBox=document.getElementById("sosok-box");
  function fillSosok(){
    const g=gubunSel.value;
    let opts=[];
    if(g==="교구") opts=GU_LIST;
    else if(g==="교회학교") opts=BU_LIST;
    if(!opts.length){ sosokBox.innerHTML=`<span class="chk-hint">‘전체’ 구분에서는 모든 소속이 집계됩니다. (교구 또는 교회학교를 고르면 선택 가능)</span>`; return; }
    sosokBox.innerHTML =
      `<label class="chk all"><input type="checkbox" id="sosok-all" checked>전체</label>`+
      opts.map(o=>`<label class="chk"><input type="checkbox" class="sosok-c" value="${o}">${o}</label>`).join("");
    const all=sosokBox.querySelector("#sosok-all");
    const cs=[...sosokBox.querySelectorAll(".sosok-c")];
    all.addEventListener("change",()=>{ if(all.checked) cs.forEach(c=>c.checked=false); else if(!cs.some(x=>x.checked)) all.checked=true; });
    cs.forEach(c=>c.addEventListener("change",()=>{ all.checked=!cs.some(x=>x.checked); }));
  }
  fillSosok();
  gubunSel.addEventListener("change",fillSosok);
  document.getElementById("back").addEventListener("click",renderMenu);
  document.getElementById("go").addEventListener("click",runChallengeReport);
  document.querySelectorAll(".quick button").forEach(b=>b.addEventListener("click",()=>{
    const q=b.dataset.q,f=document.getElementById("from"),t=document.getElementById("to"),now=new Date();
    if(q==="all"){f.value="";t.value="";}
    else if(q==="month"){f.value=ymd(new Date(now.getFullYear(),now.getMonth(),1));t.value=ymd(now);}
    else if(q==="week"){const w=new Date(now);w.setDate(w.getDate()-6);f.value=ymd(w);t.value=ymd(now);}
    runChallengeReport();
  }));
  runChallengeReport();
}

async function runChallengeReport(){
  const from=document.getElementById("from").value;
  const to=document.getElementById("to").value;
  const gubun=document.getElementById("gubun").value;
  const selSosok=getSelectedSosok();
  const result=document.getElementById("result");
  result.innerHTML=`<div class="msg">불러오는 중...</div>`;
  const data=await callChallengeRanking(from,to).catch(()=>({ok:false,error:"network"}));
  if(!data.ok){ result.innerHTML=`<div class="msg err">조회 실패: ${data.error||"오류"}</div>`; return; }
  let list=data.list||[];
  if(gubun&&gubun!=="전체") list=list.filter(r=>r.gubun===gubun);
  if(selSosok.length) list=list.filter(r=>selSosok.includes(r.sosok));
  if(!list.length){ result.innerHTML=`<div class="msg">해당 조건에 도전 기록이 없습니다.</div>`; return; }
  list.sort((a,b)=> (b.count-a.count) || (a.name<b.name?-1:(a.name>b.name?1:0)));
  const sum=list.reduce((a,r)=>({typing:a.typing+(r.typing||0),voice:a.voice+(r.voice||0),cnt:a.cnt+r.count}),{typing:0,voice:0,cnt:0});
  const rangeTxt=(from||to)?`${from||"처음"} ~ ${to||"오늘"}`:"전체 기간";
  const rows=list.map((r,i)=>`
    <tr>
      <td>${i+1}</td>
      <td class="l"><span class="gubun-tag gubun-${r.gubun}">${r.gubun}</span></td>
      <td class="l">${r.sosok||"-"}</td>
      <td>${r.sebu||"-"}</td>
      <td class="l">${r.name||"-"}</td>
      <td>${r.typing||0}</td>
      <td>${r.voice||0}</td>
      <td><b>${r.count}</b></td>
    </tr>`).join("");
  result.innerHTML=`
    <div class="summary-row">
      <div class="kpi"><div class="n">${list.length}</div><div class="l">참여자 수</div></div>
      <div class="kpi"><div class="n">${sum.typing}</div><div class="l">타이핑</div></div>
      <div class="kpi"><div class="n">${sum.voice}</div><div class="l">음성</div></div>
      <div class="kpi"><div class="n">${sum.cnt}</div><div class="l">총 도전횟수</div></div>
    </div>
    <div class="report-toolbar">
      <span>기간: <b>${rangeTxt}</b> · 참여자 ${list.length}명</span>
      <button class="download-btn" id="download-challenge">CSV 다운로드</button>
    </div>
    <div class="table-wrap"><table>
      <thead><tr>
        <th>#</th><th class="l">구분</th><th class="l">교구/교회학교</th><th>목장/학년</th>
        <th class="l">성명</th><th>타이핑</th><th>음성</th><th>도전횟수</th>
      </tr></thead>
      <tbody>${rows}</tbody>
      <tfoot><tr>
        <td></td><td class="l">합계</td><td></td><td></td><td></td>
        <td>${sum.typing}</td><td>${sum.voice}</td><td>${sum.cnt}</td>
      </tr></tfoot>
    </table></div>`;
  attachCsvButton(
    "download-challenge",
    `성경암송_도전현황_${rangeForName(from,to)}_${fileDate()}.csv`,
    ["번호","구분","교구/교회학교","목장/학년","성명","타이핑","음성","도전횟수"],
    list.map((r,i)=>[i+1,r.gubun,r.sosok||"",r.sebu||"",r.name||"",r.typing||0,r.voice||0,r.count])
      .concat([["","합계","","","",sum.typing,sum.voice,sum.cnt]])
  );
}

// ---------- 시작 ----------
if(getPw()) { logoutBtn.hidden=false; renderMenu(); } else { renderLogin(); }
</script>
