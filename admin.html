<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>고척교회 관리자 허브</title>
<link rel="icon" href="favicon.png" />
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@700;800&family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet" />
<style>
  :root{ --navy:#1a3a6b; --navy-d:#0d1b3e; --gold:#c8a24a; --bg:#f4f6fa; --card:#fff; --ink:#1c2430; --sub:#6a7688; --line:#e3e8f0; }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Noto Sans KR",sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}
  .wrap{max-width:520px;margin:0 auto;padding:26px 18px 60px}
  .head{text-align:center;margin:18px 0 22px}
  .head .logo{width:56px;height:auto;margin-bottom:10px}
  .head h1{font-family:"Nanum Myeongjo",serif;font-size:1.5rem;color:var(--navy);letter-spacing:.5px}
  .head p{color:var(--sub);font-size:.9rem;margin-top:6px}
  /* 로그인 */
  .gate{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:26px 22px;box-shadow:0 6px 20px rgba(13,27,62,.06);text-align:center}
  .gate h2{font-size:1.05rem;color:var(--navy);margin-bottom:6px}
  .gate p{font-size:.85rem;color:var(--sub);margin-bottom:16px}
  .gate input{width:100%;padding:13px 15px;font-size:15px;border:1.5px solid var(--line);border-radius:11px;font-family:inherit}
  .gate input:focus{outline:none;border-color:var(--navy)}
  .gate button{width:100%;margin-top:12px;padding:13px;background:var(--navy);color:#fff;border:none;border-radius:11px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
  .gate button:hover{background:var(--navy-d)}
  .err{color:#c0392b;font-size:.85rem;margin-top:10px;min-height:18px}
  .gate-home{display:inline-block;margin-top:4px;color:var(--sub);font-size:.85rem;font-weight:700;text-decoration:none}
  .gate-home:hover{color:var(--navy);text-decoration:underline}
  /* 도구 */
  .tools{display:flex;flex-direction:column;gap:12px}
  .tool{display:flex;align-items:center;gap:14px;background:var(--card);border:1px solid var(--line);border-radius:15px;padding:17px 18px;text-decoration:none;color:inherit;box-shadow:0 4px 14px rgba(13,27,62,.05);transition:transform .12s, box-shadow .12s, border-color .12s}
  .tool:hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(26,58,107,.14);border-color:var(--navy)}
  .tool .ic{width:50px;height:50px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:24px;flex:none;background:linear-gradient(135deg,var(--navy),#3a63a0);color:#fff}
  .tool .tx{flex:1;min-width:0}
  .tool .tx b{display:block;font-size:1.02rem;color:var(--navy)}
  .tool .tx span{font-size:.83rem;color:var(--sub)}
  .tool .arr{color:var(--gold);font-size:1.3rem;font-weight:800;flex:none}
  .logout{display:block;width:100%;margin-top:18px;padding:11px;background:transparent;border:1px solid var(--line);border-radius:11px;color:var(--sub);font-size:.85rem;font-weight:700;cursor:pointer;font-family:inherit}
  .hidden{display:none}
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <img class="logo" src="https://summer.onlybible.kr/logo3.png" alt="고척교회" />
    <h1>고척교회 관리자</h1>
    <p>오직 성경, 말씀이 답이다!</p>
  </div>

  <!-- 로그인 -->
  <div class="gate" id="gate">
    <h2>🔒 관리자 로그인</h2>
    <p>비밀번호를 입력하면 관리 도구가 열립니다.</p>
    <input type="password" id="pw" placeholder="비밀번호" autocomplete="current-password" />
    <button id="enter">입장</button>
    <div class="err" id="err"></div>
    <a class="gate-home" href="index.html">← 첫화면으로 가기</a>
  </div>

  <!-- 도구 목록 -->
  <div id="tools" class="tools hidden"></div>
  <button id="logout" class="logout hidden">로그아웃</button>
</div>

<script>
  const API = "https://xnomlgydifiqiybervtf.supabase.co/functions/v1/api";
  const ANON = "sb_publishable_oLtieT_jw7Gjb8etEsy0jw_thBaDjl-";
  const PW_KEY = "admin-pw"; // 두 관리 도구와 공유(같은 도메인)

  // 관리 도구 목록 — 앞으로 여기에 한 줄씩 추가하면 됩니다
  const TOOLS = [
    { ic:"📖", title:"성경암송 관리", desc:"통계 · 알림발송 · 주간리포트 · 게시판", href:"admin-stats.html" },
    { ic:"🎵", title:"찬양 아카이브 관리", desc:"곡 등록 · 콤보순서 · 조회수 · 사용현황", href:"admin-praise.html" },
    { ic:"📜", title:"말씀 아카이브 관리", desc:"설교 제목 · 예배일 · 구분 · 숨김 · 삭제", href:"admin-sermon.html" },
    { ic:"🎬", title:"환영 인트로 미리보기", desc:"첫 방문 인트로 4장 — 성도님 화면엔 영향 없음", href:"index.html?preview=intro" },
    { ic:"🙏", title:"축복 인사 미리보기", desc:"첫 로그인 축복 카드 — 로그인 상태에서 확인", href:"index.html?preview=blessing" },
  ];

  const $ = (id) => document.getElementById(id);

  function showTools(){
    $("gate").classList.add("hidden");
    $("tools").innerHTML = TOOLS.map(t => `
      <a class="tool" href="${t.href}">
        <span class="ic">${t.ic}</span>
        <span class="tx"><b>${t.title}</b><span>${t.desc}</span></span>
        <span class="arr">›</span>
      </a>`).join("");
    $("tools").classList.remove("hidden");
    $("logout").classList.remove("hidden");
  }

  async function verify(pw){
    try{
      const r = await fetch(API, { method:"POST",
        headers:{ "Content-Type":"application/json", "apikey":ANON, "Authorization":"Bearer "+ANON },
        body: JSON.stringify({ action:"authCheck", pw }) });
      const j = await r.json().catch(()=>({}));
      return r.ok && j.ok === true;
    }catch(_){ return false; }
  }

  async function tryEnter(){
    const pw = $("pw").value.trim();
    if(!pw){ $("err").textContent = "비밀번호를 입력하세요."; return; }
    $("err").textContent = "확인 중...";
    if(await verify(pw)){
      sessionStorage.setItem(PW_KEY, pw);
      $("err").textContent = "";
      showTools();
    } else {
      $("err").textContent = "비밀번호가 올바르지 않습니다.";
    }
  }

  $("enter").addEventListener("click", tryEnter);
  $("pw").addEventListener("keydown", e => { if(e.key==="Enter") tryEnter(); });
  $("logout").addEventListener("click", () => { sessionStorage.removeItem(PW_KEY); location.reload(); });

  // 이미 로그인된 세션이면 바로 도구 표시
  if (sessionStorage.getItem(PW_KEY)) showTools(); else $("pw").focus();
</script>
</body>
</html>
