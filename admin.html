<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>관리자 통계 | 성경암송</title>
<link rel="icon" href="favicon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@700;800&family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet" />
<style>
  :root{
    --navy:#1a3a6b; --navy-dark:#0d1b3e; --gold:#c8a84b;
    --cream:#fdf8f0; --gray:#6b7280; --border:#ddd6c8; --light:#f3f0ea;
    --green:#2c5f2d; --error:#c0392b;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:"Noto Sans KR",sans-serif;background:var(--cream);color:#222;min-height:100vh;}
  .topbar{
    background:linear-gradient(135deg,#0d1b3e 0%,#1a3a6b 100%); color:#fff;
    padding:16px 20px; display:flex; align-items:center; justify-content:space-between;
  }
  .topbar h1{font-family:"Nanum Myeongjo",serif;font-size:1.2rem;font-weight:800;letter-spacing:.5px;}
  .topbar .logout{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.35);color:#fff;
    border-radius:999px;padding:6px 13px;font-size:.82rem;cursor:pointer;font-family:inherit;}
  .topbar .logout:hover{background:rgba(255,255,255,.28);}
  main{max-width:900px;margin:0 auto;padding:22px 16px 60px;}

  /* 로그인 */
  .login-card{max-width:360px;margin:8vh auto 0;background:#fff;border:1px solid var(--border);
    border-radius:16px;padding:30px 24px;box-shadow:0 6px 20px rgba(13,27,62,.07);text-align:center;}
  .login-card h2{font-family:"Nanum Myeongjo",serif;color:var(--navy);font-size:1.3rem;margin-bottom:8px;}
  .login-card p{color:var(--gray);font-size:.85rem;margin-bottom:20px;}
  .login-card input{width:100%;padding:12px 13px;font-size:1rem;border:1px solid var(--border);
    border-radius:10px;background:var(--cream);font-family:inherit;margin-bottom:12px;}
  .login-card input:focus{outline:none;border-color:var(--navy);background:#fff;}
  .login-card button{width:100%;padding:13px;font-size:1.02rem;font-weight:700;color:#fff;background:var(--navy);
    border:none;border-radius:12px;cursor:pointer;font-family:inherit;transition:background .15s;}
  .login-card button:hover{background:var(--navy-dark);}
  .login-err{color:var(--error);font-size:.85rem;margin-bottom:10px;min-height:1.1em;}

  /* 카드 메뉴 */
  .section-title{font-weight:800;color:var(--navy);font-size:1.05rem;margin:6px 2px 14px;}
  .card-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .privacy-notice{background:#fff8e8;border:1px solid #e5c978;border-radius:12px;padding:12px 14px;
    color:#6f5614;font-size:.84rem;line-height:1.55;margin-bottom:14px;}
  .privacy-notice b{color:#4b390b;}
  .dash{margin-bottom:16px;}
  .dash-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:0 2px 10px;}
  .dash-title{font-weight:800;color:var(--navy);font-size:1.05rem;}
  .dash-sub{color:var(--gray);font-size:.78rem;white-space:nowrap;}
  .dash-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:10px;}
  .dash-kpi{background:#fff;border:1px solid var(--border);border-radius:14px;padding:13px 10px;
    box-shadow:0 2px 10px rgba(26,58,107,.05);min-width:0;text-align:center;}
  .dash-kpi .n{font-size:1.55rem;font-weight:800;color:var(--navy);line-height:1.15;}
  .dash-kpi .l{font-size:.78rem;color:var(--gray);margin-top:4px;line-height:1.3;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .dash-panels{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .dash-panel{background:#fff;border:1px solid var(--border);border-radius:14px;padding:13px 14px;min-width:0;}
  .dash-panel .h{font-weight:800;color:var(--navy);font-size:.92rem;margin-bottom:8px;}
  .dash-list{display:flex;flex-direction:column;gap:7px;}
  .dash-item{display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:8px;font-size:.84rem;}
  .dash-item .rank{font-weight:800;color:var(--gold);min-width:22px;}
  .dash-item .name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#333;}
  .dash-item .cnt{font-weight:800;color:var(--navy);white-space:nowrap;}
  .dash-msg{background:#fff;border:1px solid var(--border);border-radius:14px;padding:16px;text-align:center;color:var(--gray);font-size:.86rem;}
  .rep-card{display:flex;align-items:center;gap:13px;background:#fff;border:1px solid var(--border);
    border-radius:14px;padding:15px 16px;cursor:pointer;transition:transform .12s,box-shadow .12s,border-color .12s;
    box-shadow:0 2px 10px rgba(26,58,107,.06);}
  .rep-card:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(26,58,107,.14);border-color:#c3d0e8;}
  .rep-card .ic{flex:none;width:46px;height:46px;display:flex;align-items:center;justify-content:center;
    font-size:23px;background:var(--cream);border:1px solid var(--border);border-radius:12px;}
  .rep-card .rep-text{flex:1;min-width:0;}
  .rep-card .ti{font-weight:800;color:var(--navy);font-size:1rem;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .rep-card .de{color:var(--gray);font-size:.8rem;margin-top:3px;line-height:1.4;}
  .rep-card .rep-arrow{flex:none;color:#c3ccdb;font-size:24px;font-weight:700;line-height:1;}
  .rep-card:hover .rep-arrow{color:var(--navy);}
  .rep-card.soon{opacity:.55;cursor:default;}
  .rep-card.soon:hover{transform:none;box-shadow:0 2px 10px rgba(26,58,107,.06);border-color:var(--border);}
  @media (max-width:560px){ .card-grid{grid-template-columns:1fr;} .dash-grid{grid-template-columns:repeat(2,1fr);} .dash-panels{grid-template-columns:1fr;} }

  /* 리포트 */
  .rep-head{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
  .back-btn{background:#eef1f8;border:1.5px solid var(--navy);color:var(--navy);border-radius:999px;
    padding:7px 14px;font-size:.85rem;font-weight:700;cursor:pointer;font-family:inherit;}
  .back-btn:hover{background:var(--navy);color:#fff;}
  .rep-head h2{font-family:"Nanum Myeongjo",serif;color:var(--navy);font-size:1.2rem;}

  .filters{display:flex;flex-wrap:wrap;align-items:flex-end;gap:12px;background:#fff;border:1px solid var(--border);
    border-radius:12px;padding:14px 16px;margin-bottom:16px;}
  .filters .fld{display:flex;flex-direction:column;gap:5px;}
  .filters label{font-size:.8rem;color:var(--gray);font-weight:600;}
  .filters input[type=date]{padding:9px 11px;border:1px solid var(--border);border-radius:9px;
    background:var(--cream);font-family:inherit;font-size:.92rem;}
  .filters .go{padding:10px 20px;font-weight:700;color:#fff;background:var(--navy);border:none;
    border-radius:10px;cursor:pointer;font-family:inherit;}
  .filters .go:hover{background:var(--navy-dark);}
  .filters .quick{display:flex;gap:6px;}
  .filters .quick button{font-size:.78rem;padding:7px 10px;border:1px solid var(--border);background:#fff;
    color:var(--navy);border-radius:8px;cursor:pointer;font-family:inherit;}
  .filters .quick button:hover{background:var(--cream);}
  .chk-box{display:flex;flex-wrap:wrap;gap:6px;padding:8px;border:1px solid var(--border);
    border-radius:9px;background:var(--cream);min-width:240px;}
  .chk{display:inline-flex;align-items:center;gap:5px;font-size:.85rem;background:#fff;
    border:1px solid var(--border);border-radius:999px;padding:5px 11px;cursor:pointer;user-select:none;}
  .chk input{cursor:pointer;margin:0;}
  .chk.all{font-weight:700;color:var(--navy);}
  .chk-hint{font-size:.82rem;color:var(--gray);padding:2px 4px;}

  .summary-row{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:14px;}
  .kpi{flex:1;min-width:120px;background:#fff;border:1px solid var(--border);border-radius:12px;padding:12px 14px;text-align:center;}
  .kpi .n{font-size:1.5rem;font-weight:800;color:var(--navy);}
  .kpi .l{font-size:.76rem;color:var(--gray);margin-top:2px;white-space:nowrap;}
  .report-toolbar{display:flex;align-items:center;justify-content:space-between;gap:10px;
    font-size:.82rem;color:var(--gray);margin:2px 2px 10px;}
  .download-btn{border:1.5px solid var(--navy);background:#eef1f8;color:var(--navy);
    border-radius:999px;padding:7px 13px;font-size:.8rem;font-weight:800;cursor:pointer;font-family:inherit;white-space:nowrap;}
  .download-btn:hover{background:var(--navy);color:#fff;}

  .table-wrap{overflow-x:auto;background:#fff;border:1px solid var(--border);border-radius:12px;}
  table{width:100%;border-collapse:collapse;min-width:560px;}
  th,td{padding:11px 12px;text-align:center;font-size:.9rem;border-bottom:1px solid var(--light);white-space:nowrap;}
  thead th{background:var(--navy);color:#fff;font-weight:700;position:sticky;top:0;}
  tbody tr:hover{background:var(--cream);}
  td.l,th.l{text-align:left;}
  tfoot td{font-weight:800;color:var(--navy);background:var(--light);border-top:2px solid var(--border);}
  .gubun-tag{display:inline-block;font-size:.78rem;font-weight:700;padding:2px 9px;border-radius:999px;}
  .gubun-교구{background:#e7ecf5;color:var(--navy);}
  .gubun-교회학교{background:#f4e3ad;color:var(--navy-dark);}
  .msg{text-align:center;color:var(--gray);padding:30px;}
  .err{color:var(--error);}
  @media (max-width:700px){
    .topbar{padding:14px 14px;}
    .topbar h1{font-size:1.02rem;}
    main{padding:16px 12px 44px;}
    .dash-head{align-items:flex-start;flex-direction:column;gap:2px;}
    .dash-sub{white-space:normal;}
    .dash-grid{grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;}
    .dash-kpi{padding:12px 10px;}
    .dash-kpi .n{font-size:1.35rem;}
    .dash-panels{grid-template-columns:1fr;}
    .dash-panel{padding:12px;}
    .dash-item{font-size:.82rem;}
    .privacy-notice{font-size:.8rem;}
    .rep-card{padding:15px 16px;}
    .filters{padding:12px;gap:10px;}
    .filters .fld{flex:1 1 140px;}
    .filters input[type=date], .filters .go{width:100%;}
    .report-toolbar{align-items:flex-start;flex-direction:column;}
    .download-btn{width:100%;}
  }
  @media (max-width:380px){
    .dash-grid{grid-template-columns:1fr;}
  }
</style>
</head>
<body>
  <div class="topbar">
    <h1>📊 성경암송 관리자 통계</h1>
    <button class="logout" id="logout" hidden>로그아웃</button>
  </div>
  <main id="app"></main>

<script>
// v2: Supabase Edge Function(api) 호출
const API = "https://xnomlgydifiqiybervtf.supabase.co/functions/v1/api";
const ANON = "sb_publishable_oLtieT_jw7Gjb8etEsy0jw_thBaDjl-";
async function callApi(payload){
  const res = await fetch(API, {
    method:"POST",
    headers:{ "Content-Type":"application/json", "apikey":ANON, "Authorization":"Bearer "+ANON },
    body: JSON.stringify(payload),
  });
  let data={}; try{ data=await res.json(); }catch(_){}
  if(!res.ok && !data.error) data={ ok:false, error:"HTTP "+res.status };
  return data;
}
const PW_KEY = "admin-pw";
const GU_LIST = ["믿음","소망","사랑","섬김","은혜","화평","기쁨","새가족"];
const BU_LIST = ["사랑부","영아부","유아부","유치부","유년부","초등부","중등부","고등부","청년부"];
const app = document.getElementById("app");
const logoutBtn = document.getElementById("logout");

logoutBtn.addEventListener("click", () => {
  sessionStorage.removeItem(PW_KEY);
  logoutBtn.hidden = true;
  renderLogin();
});

function getPw(){ return sessionStorage.getItem(PW_KEY) || ""; }

function htmlEsc(v){
  return String(v==null?"":v).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m]));
}

async function callStats(from, to){
  return callApi({ action:"stats", pw:getPw(), from:from||"", to:to||"" });
}

// ---------- 로그인 ----------
function renderLogin(){
  logoutBtn.hidden = true;
  app.innerHTML = `
    <div class="login-card">
      <h2>🔒 관리자 로그인</h2>
      <p>통계를 보려면 관리자 비밀번호를 입력하세요.</p>
      <div class="login-err" id="lerr"></div>
      <input type="password" id="pw" placeholder="비밀번호" autocomplete="current-password" />
      <button id="login">로그인</button>
    </div>`;
  const pwInput = document.getElementById("pw");
  const err = document.getElementById("lerr");
  async function tryLogin(){
    const pw = pwInput.value.trim();
    if(!pw){ err.textContent="비밀번호를 입력하세요."; return; }
    err.textContent = "확인 중...";
    sessionStorage.setItem(PW_KEY, pw);
    const data = await callStats("","").catch(()=>({ok:false,error:"network"}));
    if(data.ok){ logoutBtn.hidden=false; renderMenu(); }
    else {
      sessionStorage.removeItem(PW_KEY);
      err.textContent = data.error==="unauthorized" ? "비밀번호가 올바르지 않습니다."
        : data.error==="no-password-set" ? "서버에 비밀번호가 설정되지 않았습니다(관리자 설정 필요)."
        : "연결 오류입니다. 잠시 후 다시 시도하세요.";
    }
  }
  document.getElementById("login").addEventListener("click", tryLogin);
  pwInput.addEventListener("keydown", e=>{ if(e.key==="Enter") tryLogin(); });
  pwInput.focus();
}

// ---------- 카드 메뉴 ----------
function renderMenu(){
  logoutBtn.hidden = false;
  app.innerHTML = `
    <div class="dash" id="dash">
      <div class="dash-head">
        <div class="dash-title">운영 대시보드</div>
        <div class="dash-sub">오늘과 이번 주 흐름을 빠르게 확인합니다.</div>
      </div>
      <div class="dash-msg">대시보드를 불러오는 중...</div>
    </div>
    <div class="section-title">통계 리포트</div>
    <div class="privacy-notice">
      <b>개인정보 취급 주의</b><br>
      관리자 통계에는 성명, 소속, 암송·도전 기록이 포함됩니다.
      암송 프로그램 운영과 참여 격려 목적 외에는 사용하지 말고, 외부 공유 시 필요한 범위로만 최소화해 주세요.
    </div>
    <div class="card-grid">
      <div class="rep-card" id="rep-usage">
        <div class="ic">📅</div>
        <div class="rep-text">
          <div class="ti">기간별 사용현황</div>
          <div class="de">구분·소속별 신규/참여 인원과 타이핑·음성 횟수</div>
        </div>
        <div class="rep-arrow">›</div>
      </div>
      <div class="rep-card" id="rep-participants">
        <div class="ic">👥</div>
        <div class="rep-text">
          <div class="ti">참여자 현황</div>
          <div class="de">개인별 타이핑·음성·총횟수</div>
        </div>
        <div class="rep-arrow">›</div>
      </div>
      <div class="rep-card" id="rep-verses">
        <div class="ic">📖</div>
        <div class="rep-text">
          <div class="ti">구절별 현황</div>
          <div class="de">구절마다 참여자 수와 참여횟수</div>
        </div>
        <div class="rep-arrow">›</div>
      </div>
      <div class="rep-card" id="rep-challenge">
        <div class="ic">🔥</div>
        <div class="rep-text">
          <div class="ti">도전 현황</div>
          <div class="de">'말씀 도전' 참여자별 도전 횟수</div>
        </div>
        <div class="rep-arrow">›</div>
      </div>
    </div>`;
  document.getElementById("rep-usage").addEventListener("click", renderUsageReport);
  document.getElementById("rep-participants").addEventListener("click", renderParticipants);
  document.getElementById("rep-verses").addEventListener("click", renderVerses);
  document.getElementById("rep-challenge").addEventListener("click", renderChallengeReport);
  loadDashboard();
}

function weekStart(d){
  const x=new Date(d);
  const day=x.getDay();
  const diff=day===0?6:day-1;
  x.setDate(x.getDate()-diff);
  return x;
}
function sumStatsList(list){
  return (list||[]).reduce((a,r)=>({
    newCount:a.newCount+(r.newCount||0),
    participants:a.participants+(r.participants||0),
    typing:a.typing+(r.typing||0),
    voice:a.voice+(r.voice||0),
    total:a.total+(r.total||0)
  }),{newCount:0,participants:0,typing:0,voice:0,total:0});
}
function sumChallenge(list){
  return (list||[]).reduce((a,r)=>({
    people:a.people+1,
    count:a.count+(r.count||0),
    typing:a.typing+(r.typing||0),
    voice:a.voice+(r.voice||0)
  }),{people:0,count:0,typing:0,voice:0});
}
async function loadDashboard(){
  const dash=document.getElementById("dash");
  if(!dash) return;
  const today=ymd(new Date());
  const wk=ymd(weekStart(new Date()));
  try{
    const [todayStats,weekStats,allStats,todayChallenge,weekChallenge,verseMap,weekVerses]=await Promise.all([
      callStats(today,today),
      callStats(wk,today),
      callStats("",""),
      callChallengeRanking(today,today),
      callChallengeRanking(wk,today),
      loadVerseMap(),
      callVerses(wk,today)
    ]);
    if(todayStats.error==="unauthorized"||weekStats.error==="unauthorized"||allStats.error==="unauthorized"){
      sessionStorage.removeItem(PW_KEY); renderLogin(); return;
    }
    const ts=sumStatsList(todayStats.list||[]);
    const ws=sumStatsList(weekStats.list||[]);
    const as=sumStatsList(allStats.list||[]);
    const tc=sumChallenge(todayChallenge.list||[]);
    const wc=sumChallenge(weekChallenge.list||[]);
    const topVerses=(weekVerses.list||[]).slice().sort((a,b)=>(b.count-a.count)).slice(0,5);
    const topVerseHtml=topVerses.length ? topVerses.map((r,i)=>`
      <div class="dash-item">
        <span class="rank">${i+1}</span>
        <span class="name">${htmlEsc(verseLabel(verseMap,r.no))}</span>
        <span class="cnt">${r.count}회</span>
      </div>`).join("") : `<div class="dash-msg">이번 주 구절 기록이 없습니다.</div>`;
    const topChallenge=(weekChallenge.list||[]).slice().sort((a,b)=>(b.count-a.count)).slice(0,5);
    const topChallengeHtml=topChallenge.length ? topChallenge.map((r,i)=>`
      <div class="dash-item">
        <span class="rank">${i+1}</span>
        <span class="name">${htmlEsc((r.sosok||"")+" "+(r.name||""))}</span>
        <span class="cnt">${r.count}회</span>
      </div>`).join("") : `<div class="dash-msg">이번 주 도전 기록이 없습니다.</div>`;
    dash.innerHTML=`
      <div class="dash-head">
        <div class="dash-title">운영 대시보드</div>
        <div class="dash-sub">오늘 ${today} · 이번 주 ${wk} ~ ${today}</div>
      </div>
      <div class="dash-grid">
        <div class="dash-kpi"><div class="n">${ts.participants}</div><div class="l">오늘 참여자</div></div>
        <div class="dash-kpi"><div class="n">${ws.participants}</div><div class="l">주간 참여자</div></div>
        <div class="dash-kpi"><div class="n">${as.participants}</div><div class="l">누적 참여자</div></div>
        <div class="dash-kpi"><div class="n">${tc.count}</div><div class="l">오늘 도전</div></div>
        <div class="dash-kpi"><div class="n">${ws.total}</div><div class="l">주간 활동</div></div>
        <div class="dash-kpi"><div class="n">${wc.count}</div><div class="l">주간 도전</div></div>
        <div class="dash-kpi"><div class="n">${as.total}</div><div class="l">누적 활동</div></div>
        <div class="dash-kpi"><div class="n">${weekVerses.list?weekVerses.list.length:0}</div><div class="l">주간 구절</div></div>
      </div>
      <div class="dash-panels">
        <div class="dash-panel"><div class="h">이번 주 많이 참여한 말씀</div><div class="dash-list">${topVerseHtml}</div></div>
        <div class="dash-panel"><div class="h">이번 주 도전 Top 5</div><div class="dash-list">${topChallengeHtml}</div></div>
      </div>`;

function ymd(d){
  const z=n=>String(n).padStart(2,"0");
  return d.getFullYear()+"-"+z(d.getMonth()+1)+"-"+z(d.getDate());
}
function fileDate(){
  return ymd(new Date()).replaceAll("-","");
}
function rangeForName(from,to){
  if(!from&&!to) return "전체";
  return (from||"처음")+"_"+(to||"오늘");
}
function csvEscape(v){
  const s=String(v==null?"":v);
  return /[",\r\n]/.test(s) ? `"${s.replaceAll('"','""')}"` : s;
}
function downloadCsv(filename, headers, rows){
  const lines=[headers, ...rows].map(row=>row.map(csvEscape).join(","));
  const blob=new Blob(["\ufeff"+lines.join("\r\n")],{type:"text/csv;charset=utf-8"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;
  a.download=filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}
function attachCsvButton(id, filename, headers, rows){
  const btn=document.getElementById(id);
  if(!btn) return;
  btn.addEventListener("click",()=>downloadCsv(filename,headers,rows));
}

let VERSE_MAP=null;
async function loadVerseMap(){
  if(VERSE_MAP) return VERSE_MAP;
  VERSE_MAP={};
  const urls=[
    "verses.json?v="+Date.now(),
    "https://sewoongkim1.github.io/bible-memorize-church-app/verses.json?v="+Date.now()
  ];
  for(const url of urls){
    try{
      const res=await fetch(url,{cache:"no-cache"});
      if(!res.ok) throw new Error("HTTP "+res.status);
      const d=await res.json();
      (d.verses||[]).forEach(v=>{
        const label=[v.refShort||v.refFull||("No."+v.no), v.sermonTitle].filter(Boolean).join(" · ");
        VERSE_MAP[String(Number(v.no))]=label;
      });
      if(Object.keys(VERSE_MAP).length) break;
    }catch{ /* 다음 경로로 재시도 */ }
  }
  return VERSE_MAP;
}
function verseLabel(map,no){
  const key=String(Number(no));
  return map[key] || ("No."+no);
}

  const gubunSel=document.getElementById("gubun");
  const sosokBox=document.getElementById("sosok-box");
  function fillSosok(){
    const g=gubunSel.value;
    let opts=[];
    if(g==="교구") opts=GU_LIST;
    else if(g==="교회학교") opts=BU_LIST;
    if(!opts.length){ sosokBox.innerHTML=`<span class="chk-hint">‘전체’ 구분에서는 모든 소속이 집계됩니다. (교구 또는 교회학교를 고르면 선택 가능)</span>`; return; }
    sosokBox.innerHTML =
      `<label class="chk all"><input type="checkbox" id="sosok-all" checked>전체</label>`+
      opts.map(o=>`<label class="chk"><input type="checkbox" class="sosok-c" value="${o}">${o}</label>`).join("");
    const all=sosokBox.querySelector("#sosok-all");
    const cs=[...sosokBox.querySelectorAll(".sosok-c")];
    all.addEventListener("change",()=>{ if(all.checked) cs.forEach(c=>c.checked=false); else if(!cs.some(x=>x.checked)) all.checked=true; });
    cs.forEach(c=>c.addEventListener("change",()=>{ all.checked=!cs.some(x=>x.checked); }));
  }
  fillSosok();
  gubunSel.addEventListener("change",fillSosok);
  document.getElementById("back").addEventListener("click",renderMenu);
  document.getElementById("go").addEventListener("click",runChallengeReport);
  document.querySelectorAll(".quick button").forEach(b=>b.addEventListener("click",()=>{
    const q=b.dataset.q,f=document.getElementById("from"),t=document.getElementById("to"),now=new Date();
    if(q==="all"){f.value="";t.value="";}
    else if(q==="month"){f.value=ymd(new Date(now.getFullYear(),now.getMonth(),1));t.value=ymd(now);}
    else if(q==="week"){const w=new Date(now);w.setDate(w.getDate()-6);f.value=ymd(w);t.value=ymd(now);}
    runChallengeReport();
  }));
  runChallengeReport();
}

async function runChallengeReport(){
  const from=document.getElementById("from").value;
  const to=document.getElementById("to").value;
  const gubun=document.getElementById("gubun").value;
  const selSosok=getSelectedSosok();
  const result=document.getElementById("result");
  result.innerHTML=`<div class="msg">불러오는 중...</div>`;
  const data=await callChallengeRanking(from,to).catch(()=>({ok:false,error:"network"}));
  if(!data.ok){ result.innerHTML=`<div class="msg err">조회 실패: ${data.error||"오류"}</div>`; return; }
  let list=data.list||[];
  if(gubun&&gubun!=="전체") list=list.filter(r=>r.gubun===gubun);
  if(selSosok.length) list=list.filter(r=>selSosok.includes(r.sosok));
  if(!list.length){ result.innerHTML=`<div class="msg">해당 조건에 도전 기록이 없습니다.</div>`; return; }
  list.sort((a,b)=> (b.count-a.count) || (a.name<b.name?-1:(a.name>b.name?1:0)));
  const sum=list.reduce((a,r)=>({typing:a.typing+(r.typing||0),voice:a.voice+(r.voice||0),cnt:a.cnt+r.count}),{typing:0,voice:0,cnt:0});
  const rangeTxt=(from||to)?`${from||"처음"} ~ ${to||"오늘"}`:"전체 기간";
  const rows=list.map((r,i)=>`
    <tr>
      <td>${i+1}</td>
      <td class="l"><span class="gubun-tag gubun-${r.gubun}">${r.gubun}</span></td>
      <td class="l">${r.sosok||"-"}</td>
      <td>${r.sebu||"-"}</td>
      <td class="l">${r.name||"-"}</td>
      <td>${r.typing||0}</td>
      <td>${r.voice||0}</td>
      <td><b>${r.count}</b></td>
    </tr>`).join("");
  result.innerHTML=`
    <div class="summary-row">
      <div class="kpi"><div class="n">${list.length}</div><div class="l">참여자 수</div></div>
      <div class="kpi"><div class="n">${sum.typing}</div><div class="l">타이핑</div></div>
      <div class="kpi"><div class="n">${sum.voice}</div><div class="l">음성</div></div>
      <div class="kpi"><div class="n">${sum.cnt}</div><div class="l">총 도전횟수</div></div>
    </div>
    <div class="report-toolbar">
      <span>기간: <b>${rangeTxt}</b> · 참여자 ${list.length}명</span>
      <button class="download-btn" id="download-challenge">CSV 다운로드</button>
    </div>
    <div class="table-wrap"><table>
      <thead><tr>
        <th>#</th><th class="l">구분</th><th class="l">교구/교회학교</th><th>목장/학년</th>
        <th class="l">성명</th><th>타이핑</th><th>음성</th><th>도전횟수</th>
      </tr></thead>
      <tbody>${rows}</tbody>
      <tfoot><tr>
        <td></td><td class="l">합계</td><td></td><td></td><td></td>
        <td>${sum.typing}</td><td>${sum.voice}</td><td>${sum.cnt}</td>
      </tr></tfoot>
    </table></div>`;
  attachCsvButton(
    "download-challenge",
    `성경암송_도전현황_${rangeForName(from,to)}_${fileDate()}.csv`,
    ["번호","구분","교구/교회학교","목장/학년","성명","타이핑","음성","도전횟수"],
    list.map((r,i)=>[i+1,r.gubun,r.sosok||"",r.sebu||"",r.name||"",r.typing||0,r.voice||0,r.count])
      .concat([["","합계","","","",sum.typing,sum.voice,sum.cnt]])
  );
}

// ---------- 시작 ----------
if(getPw()) { logoutBtn.hidden=false; renderMenu(); } else { renderLogin(); }
</script>
</body>
</html>
