<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>말씀 아카이브 관리</title>
<style>
  :root { --navy:#1a3a6b; --gold:#a67c12; --line:#e2ded2; --ink:#17223a; --mute:#7c8598; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:system-ui,"Malgun Gothic",sans-serif; background:#f4f2ec; color:var(--ink); }
  header { background:var(--navy); color:#fff; padding:14px 18px; display:flex; align-items:center; gap:12px; position:sticky; top:0; z-index:10; }
  header h1 { font-size:16px; margin:0; flex:1; }
  header a, header button { color:#fff; background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.2); border-radius:8px; padding:6px 12px; font-size:13px; text-decoration:none; cursor:pointer; }
  main { max-width:920px; margin:0 auto; padding:16px; }
  .addbox { background:#eef4ff; border:1px solid #cfe0f7; border-radius:12px; padding:12px 14px; margin-bottom:14px; }
  .addlabel { font-size:13px; font-weight:700; color:var(--navy); margin-bottom:8px; }
  .addlabel span { font-weight:400; color:var(--mute); font-size:11px; }
  .addrow { display:flex; gap:8px; }
  .addrow input { flex:1; padding:9px 12px; border:1px solid var(--line); border-radius:8px; font-size:14px; }
  .addrow button { padding:9px 20px; background:var(--gold); color:#fff; border:0; border-radius:8px; font-weight:700; cursor:pointer; }
  .addrow button:disabled { opacity:.6; cursor:default; }
  .bar { display:flex; gap:10px; align-items:center; margin-bottom:14px; flex-wrap:wrap; }
  .bar input { flex:1; min-width:180px; padding:9px 12px; border:1px solid var(--line); border-radius:8px; }
  .count { font-size:12px; color:var(--mute); font-family:ui-monospace,monospace; }
  .row { background:#fff; border:1px solid var(--line); border-radius:10px; padding:12px; margin-bottom:10px; }
  .row.hidden-row { opacity:.55; }
  .grid { display:grid; grid-template-columns:1fr 120px 130px; gap:8px; }
  @media (max-width:640px){ .grid { grid-template-columns:1fr; } }
  .grid label { font-size:11px; color:var(--mute); display:block; margin-bottom:3px; }
  .grid input, .grid select { width:100%; padding:7px 9px; border:1px solid var(--line); border-radius:7px; font-size:14px; }
  .meta { font-size:11px; color:var(--mute); font-family:ui-monospace,monospace; margin-top:6px; }
  .actions { display:flex; gap:8px; margin-top:10px; }
  .actions button { padding:7px 14px; border-radius:8px; border:0; font-size:13px; font-weight:600; cursor:pointer; }
  .save { background:var(--navy); color:#fff; }
  .hide { background:#eee; color:#555; }
  .del { background:#fff; color:#c0392b; border:1px solid #e6b0aa; }
  .login { max-width:320px; margin:60px auto; text-align:center; }
  .login input { width:100%; padding:11px; border:1px solid var(--line); border-radius:8px; margin:10px 0; }
  .login button { width:100%; padding:11px; background:var(--navy); color:#fff; border:0; border-radius:8px; font-weight:700; cursor:pointer; }
  .toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#222; color:#fff; padding:10px 18px; border-radius:20px; font-size:13px; opacity:0; transition:opacity .3s; pointer-events:none; }
  .toast.show { opacity:1; }
  #report { position:fixed; inset:0; background:rgba(23,34,58,.45); display:flex; align-items:center; justify-content:center; z-index:50; padding:16px; }
  .rp-card { background:#fff; border-radius:14px; max-width:560px; width:100%; max-height:80vh; overflow:auto; box-shadow:0 20px 50px rgba(0,0,0,.3); }
  .rp-head { display:flex; align-items:center; justify-content:space-between; padding:14px 18px; border-bottom:1px solid var(--line); font-weight:700; color:var(--navy); position:sticky; top:0; background:#fff; }
  .rp-head button { border:1px solid var(--line); background:#f4f2ec; border-radius:8px; padding:5px 12px; cursor:pointer; font-size:13px; }
  .rp-sum { padding:14px 18px; font-size:15px; }
  .rp-sum .ok { color:#2f7a4f; } .rp-sum .bad { color:#c0392b; }
  .rp-note { padding:0 18px 10px; font-size:12px; color:var(--mute); }
  .rp-list { padding:0 12px 14px; }
  .rp-ok { text-align:center; padding:24px; color:#2f7a4f; font-weight:600; }
  .rp-row { border:1px solid #f0d9d5; background:#fdf5f4; border-radius:10px; padding:10px 12px; margin:6px; }
  .rp-row b { color:var(--ink); } .rp-date { font-size:11px; color:var(--mute); font-family:ui-monospace,monospace; margin-left:6px; }
  .rp-err { display:inline-block; background:#c0392b; color:#fff; font-size:11px; padding:2px 8px; border-radius:10px; margin:6px 4px 0 0; }
</style>
</head>
<body>
<div id="app"></div>
<div class="toast" id="toast"></div>
<script>
const FN = "https://xnomlgydifiqiybervtf.supabase.co/functions/v1/sermon";
const KEY = "sb_publishable_oLtieT_jw7Gjb8etEsy0jw_thBaDjl-";
const CATS = ["주일설교","금요성령집회","새벽기도회","송구영신예배","특별집회","청년예배"];
let pw = sessionStorage.getItem("admin-pw") || "";
let all = [];
const $ = (id) => document.getElementById(id);
const esc = (s) => String(s==null?"":s).replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

async function call(action, body={}) {
  const r = await fetch(FN, { method:"POST", headers:{ "Content-Type":"application/json", apikey:KEY, Authorization:"Bearer "+KEY },
    body: JSON.stringify({ action, secret:pw, ...body }) });
  return r.json();
}
function toast(m){ const t=$("toast"); t.textContent=m; t.classList.add("show"); setTimeout(()=>t.classList.remove("show"),1800); }

function renderLogin(msg){
  $("app").innerHTML = `<div class="login"><h2>말씀 아카이브 관리</h2>
    ${msg?`<p style="color:#c0392b;font-size:13px">${msg}</p>`:""}
    <input id="pw" type="password" placeholder="관리자 비밀번호" />
    <button id="go">로그인</button></div>`;
  $("go").onclick = tryLogin;
  $("pw").onkeydown = (e)=>{ if(e.key==="Enter") tryLogin(); };
}
async function tryLogin(){
  pw = $("pw") ? $("pw").value : pw;
  const j = await call("authCheck");
  if(j.ok){ sessionStorage.setItem("admin-pw", pw); load(); }
  else renderLogin("비밀번호가 틀렸어요.");
}
async function load(){
  $("app").innerHTML = "<main><p>불러오는 중…</p></main>";
  const j = await call("adminList");
  if(!j.ok){ renderLogin(j.error||"인증 필요"); return; }
  all = j.sermons || [];
  render();
}
function render(){
  const q = ($("q")?$("q").value:"").trim().toLowerCase();
  const list = all.filter(s=>!q || (s.title||"").toLowerCase().includes(q) || (s.category||"").includes(q));
  $("app").innerHTML = `<header>
      <h1>📜 말씀 아카이브 관리</h1>
      <span class="count">${all.length}편</span>
      <button id="checkbtn">🩺 점검</button>
      <a href="admin.html">← 허브</a>
    </header>
    <main>
      <div class="addbox">
        <div class="addlabel">➕ 유튜브 링크로 새 설교 추가 <span>(자막→AI노트→3분음성→테이블까지 자동, 2~3분 소요)</span></div>
        <div class="addrow">
          <input id="addurl" placeholder="유튜브 설교 링크 붙여넣기 (예: https://youtu.be/xxxx)" />
          <button id="addbtn">추가</button>
        </div>
      </div>
      <div class="bar"><input id="q" placeholder="제목·구분 검색" value="${esc(q)}" /></div>
      <div id="rows"></div>
    </main>`;
  $("q").oninput = render;
  $("addbtn").onclick = addByUrl;
  $("checkbtn").onclick = checkAll;
  $("rows").innerHTML = list.map(rowHtml).join("");
  list.forEach(s=>{
    $("save-"+s.id).onclick = ()=>save(s.id);
    $("hide-"+s.id).onclick = ()=>toggleHide(s.id);
    $("del-"+s.id).onclick = ()=>del(s.id);
  });
}
function rowHtml(s){
  return `<div class="row ${s.hidden?'hidden-row':''}">
    <div class="grid">
      <div><label>제목</label><input id="t-${s.id}" value="${esc(s.title)}" /></div>
      <div><label>예배일</label><input id="d-${s.id}" type="date" value="${esc(s.date)}" /></div>
      <div><label>구분</label><select id="c-${s.id}">${CATS.map(c=>`<option ${c===s.category?"selected":""}>${c}</option>`).join("")}</select></div>
    </div>
    <div class="meta">${s.id} · 📖 ${esc(s.scripture||"")} ${s.memRef?"· 암송 "+esc(s.memRef):""} ${s.hidden?"· 숨김":""}</div>
    <div class="actions">
      <button class="save" id="save-${s.id}">저장</button>
      <button class="hide" id="hide-${s.id}">${s.hidden?"공개":"숨김"}</button>
      <button class="del" id="del-${s.id}">삭제</button>
    </div>
  </div>`;
}
async function save(id){
  const s = all.find(x=>x.id===id);
  s.title = $("t-"+id).value.trim();
  s.date = $("d-"+id).value;
  s.category = $("c-"+id).value;
  const j = await call("saveSermon", { sermon:s });
  toast(j.ok?"저장됨":"실패: "+(j.error||""));
}
async function toggleHide(id){
  const s = all.find(x=>x.id===id); s.hidden = !s.hidden;
  const j = await call("saveSermon", { sermon:s });
  if(j.ok){ toast(s.hidden?"숨김 처리":"공개 처리"); render(); } else toast("실패");
}
async function del(id){
  if(!confirm("이 설교를 삭제할까요?")) return;
  const j = await call("deleteSermon", { id });
  if(j.ok){ all = all.filter(x=>x.id!==id); toast("삭제됨"); render(); } else toast("실패");
}
async function addByUrl(){
  const url = $("addurl").value.trim();
  if(!url){ toast("유튜브 링크를 넣으세요"); return; }
  const btn = $("addbtn"); btn.disabled = true; btn.textContent = "요청 중…";
  const j = await call("addByUrl", { url });
  btn.disabled = false; btn.textContent = "추가";
  if(j.ok){ $("addurl").value = ""; toast("✅ 처리 시작됨! 2~3분 뒤 목록에 반영돼요 (새로고침)"); }
  else toast("실패: " + (j.error||""));
}

// ── 설교 연결 점검(오디오 재생 · 노트 완성 · 암송 연결) ──
const SITE = "https://sermon.onlybible.kr/";
function testAudio(url){
  return new Promise(res=>{
    const a = new Audio();
    let done = false;
    const fin = ok => { if(done) return; done = true; a.src = ""; res(ok); };
    a.onloadedmetadata = () => fin(true);
    a.onerror = () => fin(false);
    setTimeout(() => fin(false), 8000);
    a.src = url;
  });
}
async function checkAll(){
  const btn = $("checkbtn"); btn.disabled = true; btn.textContent = "점검 중…";
  const results = await Promise.all(all.map(async s => {
    const note = !!(s.summary && (s.points||[]).length && s.keyVerse);
    const script = !!s.audioScript;
    const hasAudio = !!s.audio;
    const audioOk = hasAudio ? await testAudio(SITE + s.audio) : false;
    const verse = !!s.memVerseNo;
    const errs = [];
    if(!note) errs.push("노트");
    if(!script) errs.push("대본");
    if(!hasAudio) errs.push("오디오없음");
    else if(!audioOk) errs.push("오디오재생불가");
    return { s, errs, verse };
  }));
  btn.disabled = false; btn.textContent = "🩺 점검";
  renderReport(results);
}
function renderReport(results){
  const bad = results.filter(r => r.errs.length);
  const linked = results.filter(r => r.verse).length;
  const rowsHtml = bad.length
    ? bad.map(r => `<div class="rp-row"><b>${esc(r.s.title)}</b> <span class="rp-date">${esc(r.s.date||"")}</span><div>${r.errs.map(e=>`<span class="rp-err">${e}</span>`).join("")}</div></div>`).join("")
    : `<div class="rp-ok">✅ 모든 설교가 정상이에요!</div>`;
  const el = document.createElement("div");
  el.id = "report";
  el.innerHTML = `<div class="rp-card">
    <div class="rp-head">🩺 점검 결과 <button id="rp-close">닫기</button></div>
    <div class="rp-sum">
      총 <b>${results.length}</b>편 · 정상 <b class="ok">${results.length-bad.length}</b> · 문제 <b class="bad">${bad.length}</b> · 📖 암송연결 <b>${linked}</b>
    </div>
    <div class="rp-note">※ '암송연결'은 성경암송 구절이 있는 설교 수예요(없어도 정상). 아래는 <b>실제 문제</b>만 표시.</div>
    <div class="rp-list">${rowsHtml}</div>
  </div>`;
  document.body.appendChild(el);
  document.getElementById("rp-close").onclick = () => el.remove();
  el.onclick = (e) => { if(e.target === el) el.remove(); };
}
// 허브에서 넘어오면 자동 로그인
if(pw) tryLogin(); else renderLogin();
</script>
</body>
</html>
