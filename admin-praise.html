<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>찬양 아카이브 · 관리자</title>
  <link rel="icon" href="favicon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <style>
    :root { --navy:#1a3a6b; --gold:#c8a24a; --bg:#f4f6fa; --card:#fff; --ink:#1c2430; --sub:#6a7688; --line:#e3e8f0; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:"Noto Sans KR",sans-serif; background:var(--bg); color:var(--ink); }
    .wrap { max-width:820px; margin:0 auto; padding:18px 16px 60px; }
    h1 { font-size:20px; color:var(--navy); margin-bottom:4px; }
    .muted { color:var(--sub); font-size:13px; }
    .card { background:var(--card); border:1px solid var(--line); border-radius:14px; padding:18px; margin-top:16px; box-shadow:0 2px 10px rgba(26,58,107,.06); }
    label { display:block; font-size:13px; font-weight:700; margin:12px 0 5px; }
    input, select, textarea { width:100%; padding:11px 13px; font-size:14px; border:1.5px solid var(--line); border-radius:10px; font-family:inherit; background:#fff; color:var(--ink); }
    input:focus, select:focus, textarea:focus { outline:none; border-color:var(--navy); }
    .row { display:flex; gap:10px; }
    .row > * { flex:1; }
    button.pri { background:var(--navy); color:#fff; border:none; padding:12px 18px; font-size:15px; font-weight:700; border-radius:10px; }
    button.sec { background:#fff; color:var(--navy); border:1.5px solid var(--navy); padding:11px 16px; font-size:14px; font-weight:700; border-radius:10px; }
    button.ghost { background:transparent; color:var(--sub); border:1px solid var(--line); padding:7px 12px; font-size:13px; border-radius:8px; }
    button:disabled { opacity:.5; }
    .preview { display:flex; gap:12px; margin-top:12px; align-items:flex-start; }
    .preview img { width:160px; border-radius:10px; flex:none; }
    .pv-info { font-size:13px; line-height:1.7; }
    .msg { margin-top:12px; font-size:14px; padding:10px 14px; border-radius:9px; display:none; }
    .msg.ok { display:block; background:#e6f4ea; color:#1a7f37; }
    .msg.err { display:block; background:#fdeaea; color:#c0392b; }
    .list-item { display:flex; gap:10px; align-items:center; padding:9px 0; border-bottom:1px solid var(--line); font-size:13px; }
    .list-item img { width:64px; border-radius:6px; flex:none; }
    .li-body { flex:1; min-width:0; }
    .li-title { font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .li-sub { color:var(--sub); font-size:12px; }
    .gate { max-width:360px; margin:80px auto; text-align:center; }
    .tag { display:inline-block; padding:1px 7px; border-radius:9px; background:rgba(26,58,107,.1); color:var(--navy); font-size:11px; font-weight:700; }
    .hidden-badge { color:#c0392b; font-weight:700; }
    .ord-list { margin-top:8px; border:1px solid var(--line); border-radius:10px; max-height:360px; overflow-y:auto; }
    .ord-item { display:flex; align-items:center; gap:8px; padding:8px 10px; border-bottom:1px solid var(--line); }
    .ord-item:last-child { border-bottom:none; }
    .ord-num { width:24px; text-align:center; font-weight:800; color:var(--navy); font-size:13px; flex:none; }
    .ord-name { flex:1; min-width:0; font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .ord-item button.ghost { padding:5px 10px; flex:none; min-width:38px; }
    html.autologin #gate { display:none !important; }   /* 자동로그인 중엔 로그인 화면 안 보이게 */
    #autoload { display:none; position:fixed; inset:0; align-items:center; justify-content:center; color:var(--sub); font-size:14px; }
    html.autologin #autoload { display:flex; }
  </style>
</head>
<body>
  <script>try{ if(sessionStorage.getItem("admin-pw")) document.documentElement.classList.add("autologin"); }catch(e){}</script>
  <div id="autoload">불러오는 중… ⏳</div>
  <!-- 로그인 게이트 -->
  <div id="gate" class="gate">
    <h1>🎵 찬양 아카이브 관리자</h1>
    <p class="muted" style="margin:8px 0 16px">관리자 비밀번호를 입력하세요</p>
    <input id="pw" type="password" placeholder="비밀번호" />
    <button class="pri" style="margin-top:12px;width:100%" onclick="login()">입장</button>
    <p id="gate-msg" class="msg"></p>
  </div>

  <!-- 본문 -->
  <div id="main" class="wrap" style="display:none">
    <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap">
      <h1 style="margin:0">🎵 찬양 아카이브 관리자</h1>
      <a href="admin.html" style="flex:none;padding:9px 15px;border:1.5px solid var(--navy);border-radius:10px;color:var(--navy);text-decoration:none;font-weight:700;font-size:13px;background:#eef1f8">← 관리자 허브</a>
    </div>
    <p class="muted">유튜브 링크를 붙여넣으면 제목·썸네일·재생시간·조회수가 자동으로 채워집니다.</p>

    <!-- 사용 현황 -->
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <b>📊 사용 현황</b>
        <button class="ghost" onclick="loadUsage()">새로고침</button>
      </div>
      <div id="usage" style="margin-top:12px"><p class="muted">불러오는 중…</p></div>
    </div>

    <!-- 등록/수정 -->
    <div class="card">
      <label>① 유튜브 링크 또는 영상 ID</label>
      <div class="row">
        <input id="yt-url" placeholder="https://youtu.be/... 또는 영상 ID" style="flex:3" />
        <button class="sec" id="fetch-btn" onclick="fetchMeta()" style="flex:1">불러오기</button>
      </div>

      <div id="preview" class="preview" style="display:none">
        <img id="pv-thumb" src="" alt="" />
        <div class="pv-info">
          <div id="pv-title" style="font-weight:800"></div>
          <div id="pv-meta" class="muted"></div>
        </div>
      </div>

      <label>② 곡명 (자동 채움 · 수정 가능)</label>
      <input id="f-song" placeholder="곡명" />

      <div class="row">
        <div>
          <label>③ 구분</label>
          <select id="f-category">
            <option value="찬양대">찬양대</option>
            <option value="찬양팀">찬양팀</option>
            <option value="중창단">중창단</option>
            <option value="특별찬양">특별찬양</option>
          </select>
        </div>
        <div>
          <label>④ 찬양대/팀 이름</label>
          <input id="f-choir" placeholder="예: 시온찬양대" />
        </div>
      </div>

      <div class="row">
        <div>
          <label>⑤ 예배 날짜</label>
          <input id="f-date" type="date" />
        </div>
        <div>
          <label>⑥ 전체예배 영상?</label>
          <select id="f-full">
            <option value="false">아니오 (개별 찬양)</option>
            <option value="true">예 (예배 전체 녹화)</option>
          </select>
        </div>
      </div>

      <button class="pri" style="margin-top:16px;width:100%" id="save-btn" onclick="saveSong()">저장 / 등록</button>
      <p id="save-msg" class="msg"></p>
    </div>

    <!-- 콤보(구분·찬양대) 표시 순서 -->
    <div class="card">
      <b>콤보 표시 순서 (구분 · 찬양대/팀)</b>
      <p class="muted" style="margin:4px 0 10px">기존 등록된 이름을 자동으로 불러옵니다. ▲▼로 순서를 바꾸고 <b>저장</b>하면 사용자 앱 콤보 순서에 즉시 반영됩니다.</p>
      <div class="row" style="align-items:flex-start;gap:16px;flex-wrap:wrap">
        <div style="flex:1;min-width:240px">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <label style="margin:0">구분</label>
            <button class="sec" id="save-cat-ord" onclick="saveOrder('cat')">구분 순서 저장</button>
          </div>
          <div id="ord-cat" class="ord-list"></div>
        </div>
        <div style="flex:1;min-width:240px">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <label style="margin:0">찬양대/팀</label>
            <button class="sec" id="save-choir-ord" onclick="saveOrder('choir')">찬양대 순서 저장</button>
          </div>
          <div id="ord-choir" class="ord-list"></div>
        </div>
      </div>
      <p id="ord-msg" class="msg"></p>
    </div>

    <!-- 목록 -->
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <b>등록된 찬양 <span id="cnt" class="muted"></span></b>
        <div class="row" style="gap:6px">
          <input id="search" placeholder="검색" style="width:150px" oninput="renderList()" />
          <button class="ghost" onclick="loadList()">새로고침</button>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:10px;margin-top:12px;flex-wrap:wrap">
        <button class="sec" id="refresh-views" onclick="refreshAllViews()">🔄 전체 곡 조회수 새로고침</button>
        <span class="muted" style="font-size:12px">유튜브 최신 조회수를 전곡에 반영 (수 분 소요)</span>
      </div>
      <p id="refresh-msg" class="msg"></p>
      <div id="list" style="margin-top:10px"></div>
    </div>

    <p class="muted" style="text-align:center;margin-top:20px">
      <button class="ghost" onclick="logout()">로그아웃</button>
    </p>
  </div>

  <script src="praise-config.js?v=20260709a"></script>
  <script src="praise-api.js?v=20260709a"></script>
  <script>
    let SECRET = "";
    let LIST = [];
    let CATORD = [], CHOIRORD = [];
    const $ = (id) => document.getElementById(id);

    function login() {
      SECRET = $("pw").value.trim();
      if (!SECRET) return;
      // 검증: adminList 시도
      API.adminList(SECRET).then((songs) => {
        LIST = songs;
        document.documentElement.classList.remove("autologin");
        $("gate").style.display = "none";
        $("main").style.display = "block";
        sessionStorage.setItem("admin-pw", SECRET);
        renderList();
        buildOrderLists();
        loadUsage();
      }).catch(() => {
        document.documentElement.classList.remove("autologin"); // 실패 시 로그인 화면 복귀
        $("gate").style.display = "";
        $("gate-msg").className = "msg err";
        $("gate-msg").textContent = "비밀번호가 틀렸습니다.";
      });
    }
    function logout() { sessionStorage.removeItem("padm"); location.reload(); }

    async function fetchMeta() {
      const url = $("yt-url").value.trim();
      if (!url) return;
      const btn = $("fetch-btn"); btn.disabled = true; btn.textContent = "불러오는 중…";
      try {
        const m = await API.ytFetch(url, SECRET);
        $("preview").style.display = "flex";
        $("pv-thumb").src = m.thumbnail;
        $("pv-title").textContent = m.song;
        $("pv-meta").textContent = `⏱ ${m.duration} · 👁 ${(+m.views).toLocaleString()} · 📅 ${m.svc_date || "-"}`;
        $("f-song").value = m.song;
        $("f-date").value = m.svc_date || "";
        $("f-full").value = (m.duration_sec >= 1800) ? "true" : "false";
        // 자동채움 메타 보관
        $("yt-url").dataset.meta = JSON.stringify(m);
      } catch (e) {
        showMsg("save-msg", "err", "불러오기 실패: " + e.message);
      } finally {
        btn.disabled = false; btn.textContent = "불러오기";
      }
    }

    async function saveSong() {
      const metaRaw = $("yt-url").dataset.meta;
      if (!metaRaw) { showMsg("save-msg", "err", "먼저 ‘불러오기’로 영상을 확인하세요."); return; }
      const m = JSON.parse(metaRaw);
      const song = {
        id: m.id,
        song: $("f-song").value.trim() || m.song,
        category: $("f-category").value,
        choir: $("f-choir").value.trim(),
        svc_date: $("f-date").value || m.svc_date,
        duration: m.duration,
        duration_sec: m.duration_sec,
        views: m.views,
        thumbnail: m.thumbnail,
        is_full: $("f-full").value === "true",
      };
      const btn = $("save-btn"); btn.disabled = true; btn.textContent = "저장 중…";
      try {
        await API.saveSong(song, SECRET);
        showMsg("save-msg", "ok", "✅ 저장되었습니다: " + song.song);
        resetForm();
        await loadList();
      } catch (e) {
        showMsg("save-msg", "err", "저장 실패: " + e.message);
      } finally {
        btn.disabled = false; btn.textContent = "저장 / 등록";
      }
    }

    function resetForm() {
      $("yt-url").value = ""; delete $("yt-url").dataset.meta;
      $("preview").style.display = "none";
      $("f-song").value = ""; $("f-choir").value = ""; $("f-date").value = "";
      $("f-full").value = "false";
    }

    async function loadList() {
      try { LIST = await API.adminList(SECRET); renderList(); buildOrderLists(); } catch (e) {}
    }

    // ----- 콤보 순서 관리 -----
    function buildOrderLists() {
      const catMap = new Map(), choirMap = new Map();
      LIST.forEach((s) => {
        if (s.category) { const o = s.category_ordering ?? 9999; const c = catMap.get(s.category); if (c == null || o < c) catMap.set(s.category, o); }
        if (s.choir) { const o = s.choir_ordering ?? 9999; const c = choirMap.get(s.choir); if (c == null || o < c) choirMap.set(s.choir, o); }
      });
      const toArr = (m) => [...m.entries()].map(([name, ord]) => ({ name, ord })).sort((a, b) => (a.ord - b.ord) || a.name.localeCompare(b.name, "ko"));
      CATORD = toArr(catMap); CHOIRORD = toArr(choirMap);
      renderOrder();
    }
    function renderOrder() {
      const row = (kind, name, i, n) => `
        <div class="ord-item">
          <span class="ord-num">${i + 1}</span>
          <span class="ord-name">${esc(name)}</span>
          <button class="ghost" onclick="moveOrd('${kind}',${i},-1)" ${i === 0 ? "disabled" : ""}>▲</button>
          <button class="ghost" onclick="moveOrd('${kind}',${i},1)" ${i === n - 1 ? "disabled" : ""}>▼</button>
        </div>`;
      $("ord-cat").innerHTML = CATORD.map((c, i) => row("cat", c.name, i, CATORD.length)).join("") || '<p class="muted" style="padding:10px">항목 없음</p>';
      $("ord-choir").innerHTML = CHOIRORD.map((c, i) => row("choir", c.name, i, CHOIRORD.length)).join("") || '<p class="muted" style="padding:10px">항목 없음</p>';
    }
    function moveOrd(kind, i, dir) {
      const arr = kind === "cat" ? CATORD : CHOIRORD;
      const j = i + dir; if (j < 0 || j >= arr.length) return;
      [arr[i], arr[j]] = [arr[j], arr[i]];
      renderOrder();
    }
    async function saveOrder(kind) {
      const arr = kind === "cat" ? CATORD : CHOIRORD;
      const items = arr.map((c, i) => ({ name: c.name, order: i + 1 }));
      const btn = $(kind === "cat" ? "save-cat-ord" : "save-choir-ord"); const t = btn.textContent;
      btn.disabled = true; btn.textContent = "저장 중…";
      try {
        await API.setOrdering(kind === "cat" ? "category" : "choir", items, SECRET);
        showMsg("ord-msg", "ok", `✅ ${kind === "cat" ? "구분" : "찬양대/팀"} 순서 저장됨 (앱에 즉시 반영)`);
        await loadList();
      } catch (e) { showMsg("ord-msg", "err", "저장 실패: " + e.message); }
      finally { btn.disabled = false; btn.textContent = t; }
    }

    // ----- 사용 현황 -----
    async function loadUsage() {
      const el = $("usage"); el.innerHTML = '<p class="muted">불러오는 중…</p>';
      try {
        const s = await API.usageStats(SECRET);
        const box = (n, l) => `<div style="flex:1;min-width:92px;background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:12px;text-align:center">
          <div style="font-size:22px;font-weight:800;color:var(--navy)">${(+n || 0).toLocaleString()}</div>
          <div class="muted" style="font-size:12px">${l}</div></div>`;
        const top = (s.top_songs || []).map((t, i) => `<div style="display:flex;gap:8px;align-items:center;padding:6px 0;border-bottom:1px solid var(--line);font-size:13px">
          <span style="width:20px;color:var(--navy);font-weight:800">${i + 1}</span>
          <span style="flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(t.song || "(삭제된 곡)")}<span class="muted"> · ${esc(t.choir || "")}</span></span>
          <span style="font-weight:700;flex:none">${t.cnt}회</span></div>`).join("") || '<p class="muted">최근 재생 기록 없음</p>';
        el.innerHTML = `
          <div style="display:flex;gap:8px;flex-wrap:wrap">
            ${box(s.visits_today, "오늘 방문")}${box(s.uniq_today, "오늘 순방문자")}
            ${box(s.visits_7d, "7일 방문")}${box(s.uniq_7d, "7일 순방문자")}
            ${box(s.visits_total, "전체 방문")}${box(s.plays_7d, "7일 재생수")}
          </div>
          <div style="margin-top:14px"><b style="font-size:13px">🔥 최근 7일 인기곡 TOP 10</b>
            <div style="margin-top:6px">${top}</div></div>`;
      } catch (e) {
        el.innerHTML = `<p class="msg err" style="display:block">집계 준비가 안 됐어요. <b>scripts/usage-analytics.sql</b> 을 Supabase SQL 편집기에서 한 번 실행해주세요.<br><span class="muted">(${esc(e.message)})</span></p>`;
      }
    }

    // ----- 전체 곡 조회수 일괄 새로고침 (50개씩 배치) -----
    async function refreshAllViews() {
      const ids = LIST.map((s) => s.id).filter(Boolean);
      if (!ids.length) return;
      if (!confirm(`전체 ${ids.length.toLocaleString()}곡의 유튜브 조회수를 새로고침할까요?\n(수 분 걸릴 수 있어요)`)) return;
      const btn = $("refresh-views"); btn.disabled = true; const t0 = btn.textContent; btn.textContent = "새로고침 중…";
      const CH = 50; let done = 0, changed = 0; const missing = [];
      const msg = $("refresh-msg"); msg.className = "msg ok";
      try {
        for (let i = 0; i < ids.length; i += CH) {
          const chunk = ids.slice(i, i + CH);
          try {
            const res = await API.refreshViews(chunk, SECRET);
            (res.updated || []).forEach((u) => {
              const s = LIST.find((x) => x.id === u.id);
              if (s) { if ((+s.views || 0) !== (+u.views || 0)) changed++; s.views = u.views; }
            });
            (res.missing || []).forEach((id) => missing.push(id));
          } catch (e) { /* 이 배치만 건너뜀 */ }
          done += chunk.length;
          msg.textContent = `⏳ ${done.toLocaleString()}/${ids.length.toLocaleString()}곡 처리… (갱신 ${changed})`;
        }
        showMsg("refresh-msg", "ok", `✅ 완료: ${ids.length.toLocaleString()}곡 확인, ${changed}곡 조회수 갱신` + (missing.length ? `, ⚠️ 비공개/삭제 ${missing.length}곡` : ""));
        renderList();
      } finally { btn.disabled = false; btn.textContent = t0; }
    }
    function renderList() {
      const q = ($("search").value || "").trim().toLowerCase();
      const rows = LIST.filter((s) => !q || (s.song + s.choir).toLowerCase().includes(q));
      $("cnt").textContent = `(${LIST.length.toLocaleString()}곡)`;
      $("list").innerHTML = rows.slice(0, 300).map((s) => `
        <div class="list-item">
          <img src="${s.thumbnail || `https://i.ytimg.com/vi/${s.id}/default.jpg`}" alt="" />
          <div class="li-body">
            <div class="li-title">${esc(s.song)} ${s.hidden ? '<span class="hidden-badge">[숨김]</span>' : ""}</div>
            <div class="li-sub"><span class="tag">${esc(s.category||"기타")}</span> ${esc(s.choir||"")} · ${(s.svc_date||"").slice(0,10)} · ${s.is_full?"전체예배":"찬양"}</div>
          </div>
          <button class="ghost" onclick="editSong('${s.id}')">수정</button>
          <button class="ghost" onclick="toggleHide('${s.id}')">${s.hidden ? "표시" : "숨김"}</button>
          <button class="ghost" style="color:#c0392b" onclick="delSong('${s.id}')">삭제</button>
        </div>`).join("") || '<p class="muted">결과 없음</p>';
    }

    function editSong(id) {
      const s = LIST.find((x) => x.id === id); if (!s) return;
      $("yt-url").value = "https://youtu.be/" + s.id;
      $("yt-url").dataset.meta = JSON.stringify({ id: s.id, song: s.song, thumbnail: s.thumbnail, svc_date: s.svc_date, duration: s.duration, duration_sec: s.duration_sec, views: s.views });
      $("preview").style.display = "flex";
      $("pv-thumb").src = s.thumbnail || `https://i.ytimg.com/vi/${s.id}/hqdefault.jpg`;
      $("pv-title").textContent = s.song;
      $("pv-meta").textContent = `⏱ ${s.duration||"-"} · 👁 ${(+s.views||0).toLocaleString()}`;
      $("f-song").value = s.song; $("f-choir").value = s.choir || "";
      $("f-category").value = s.category || "기타";
      $("f-date").value = (s.svc_date || "").slice(0, 10);
      $("f-full").value = String(!!s.is_full);
      window.scrollTo({ top: 0, behavior: "smooth" });
    }
    async function toggleHide(id) {
      const s = LIST.find((x) => x.id === id); if (!s) return;
      s.hidden = !s.hidden;
      await API.saveSong(s, SECRET); await loadList();
    }
    async function delSong(id) {
      const s = LIST.find((x) => x.id === id);
      if (!confirm(`정말 삭제할까요?\n${s ? s.song : id}`)) return;
      await API.deleteSong(id, SECRET); await loadList();
    }

    function showMsg(el, cls, txt) { const e = $(el); e.className = "msg " + cls; e.textContent = txt; setTimeout(() => { if (cls === "ok") e.className = "msg"; }, 4000); }
    function esc(s) { return String(s).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c])); }

    // 세션 복원
    (function () {
      const s = sessionStorage.getItem("admin-pw") || sessionStorage.getItem("padm");
      if (s) { $("pw").value = s; login(); }
      $("pw").addEventListener("keydown", (e) => { if (e.key === "Enter") login(); });
    })();
  </script>
</body>
</html>
